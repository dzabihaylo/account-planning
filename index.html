<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Dynamics | Prospect Intelligence Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap');
:root {
  --dark: #080C16;
  --mid: #0F1525;
  --surface: #141B2D;
  --card: #1A2236;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #EEF2FF;
  --muted: #7C8DB5;
  --accent: #3B82F6;
  --accent2: #60A5FA;
  --green: #22C55E;
  --gold: #F59E0B;
  --red: #EF4444;
  --teal: #14B8A6;
  --purple: #A78BFA;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--dark); color: var(--text); min-height: 100vh; }

/* TOP NAV */
.topnav {
  background: rgba(8,12,22,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topnav-logo { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; white-space: nowrap; }
.topnav-logo span { color: var(--accent2); }
.topnav-search {
  flex: 1;
  max-width: 320px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--font);
  outline: none;
}
.topnav-search:focus { border-color: var(--accent); }
.topnav-search::placeholder { color: var(--muted); }
.topnav-count { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-left: auto; }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 52px); }

/* SIDEBAR */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--mid);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  display: flex;
  flex-direction: column;
}
.sidebar-section { padding: 0 12px 8px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 12px; }
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font);
}
.sidebar-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.sidebar-item.active { background: rgba(59,130,246,0.08); color: var(--accent2); border-left: 2px solid var(--accent); }
.sidebar-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sidebar-revenue { font-size: 10px; color: var(--muted); margin-left: auto; font-family: var(--mono); }

/* MAIN */
.main { flex: 1; overflow: hidden; }

/* ACCOUNT PANEL */
.account-panel { display: none; }
.account-panel.active { display: block; }

/* ACCOUNT HEADER */
.acct-header {
  background: linear-gradient(135deg, var(--mid) 0%, var(--surface) 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 32px 24px;
  position: relative;
  overflow: hidden;
}
.acct-header::after {
  content: '';
  position: absolute;
  right: -60px;
  top: -60px;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  pointer-events: none;
}
.acct-tag { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.acct-name { font-size: 28px; font-weight: 300; letter-spacing: -0.3px; line-height: 1.15; margin-bottom: 4px; }
.acct-name strong { font-weight: 500; }
.acct-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.acct-kpis { display: flex; gap: 28px; flex-wrap: wrap; }
.kpi-val { font-size: 20px; font-weight: 500; line-height: 1; }
.kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.kpi-delta { font-size: 11px; margin-top: 2px; }

/* TABS */
.acct-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  gap: 2px;
  background: var(--mid);
  overflow-x: auto;
  scrollbar-width: none;
}
.acct-tabs::-webkit-scrollbar { display: none; }
.acct-tab {
  font-family: var(--font);
  font-size: 13px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 12px;
  height: 44px;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  position: relative;
  top: 1px;
  transition: color 0.12s;
}
.acct-tab:hover { color: var(--text); }
.acct-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* CONTENT */
.acct-content { padding: 24px 32px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
}
.card-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 14px;
}
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 14px; }

/* STAT */
.stat-val { font-size: 22px; font-weight: 400; line-height: 1; }
.stat-val strong { font-weight: 500; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
.stat-delta { font-size: 11px; margin-top: 2px; }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.tag { font-size: 11px; padding: 3px 9px; border-radius: 4px; font-family: var(--mono); background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.18); color: #93C5FD; }
.tag.partner { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.18); color: #FCD34D; }
.tag.key { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); color: #86EFAC; }

/* SIGNALS */
.signal { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.signal:last-child { border-bottom: none; }
.sig-icon { width: 26px; height: 26px; border-radius: 5px; background: rgba(59,130,246,0.12); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.sig-body { flex: 1; }
.sig-text { color: var(--text); line-height: 1.5; }
.sig-meta { font-size: 10px; color: var(--accent2); font-family: var(--mono); margin-top: 3px; letter-spacing: 0.05em; }

/* HIGHLIGHT */
.hl {
  background: rgba(59,130,246,0.06);
  border: 1px solid rgba(59,130,246,0.16);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 14px;
}
.hl-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent2); margin-bottom: 4px; }

/* BAR */
.bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px; }
.bar-label { flex: 1; color: var(--text); }
.bar-track { flex: 2; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; }
.bar-fill { height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.bar-pct { min-width: 36px; text-align: right; color: var(--accent2); font-family: var(--mono); font-size: 11px; }

/* EXEC */
.exec-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 10px; }
.exec-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: border-color 0.12s; }
.exec-card:hover { border-color: rgba(59,130,246,0.3); }
.exec-av { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--teal)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: white; margin-bottom: 8px; }
.exec-name { font-size: 13px; font-weight: 500; }
.exec-title { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.exec-loc { font-size: 10px; color: var(--accent2); font-family: var(--mono); margin-top: 5px; }
.exec-new { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); font-family: var(--mono); margin-top: 4px; }

/* CHART */
.chart-wrap { position: relative; width: 100%; }

/* AI */
.ai-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; height: 500px; }
.ai-hdr { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.ai-hdr-txt { font-size: 13px; font-weight: 500; }
.ai-hdr-sub { font-size: 11px; color: var(--muted); margin-left: auto; }
.ai-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.msg { display: flex; gap: 8px; align-items: flex-start; animation: fi .18s ease; }
@keyframes fi { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.msg.user { flex-direction: row-reverse; }
.msg-av { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; }
.msg-av.ai { background: linear-gradient(135deg,var(--accent),var(--teal)); color: white; }
.msg-av.user { background: rgba(255,255,255,0.08); color: var(--muted); }
.msg-bub { max-width: 80%; padding: 9px 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
.msg.ai .msg-bub { background: var(--card); border: 1px solid var(--border); border-top-left-radius: 2px; }
.msg.user .msg-bub { background: var(--accent); border-top-right-radius: 2px; color: white; }
.msg-bub strong { color: var(--accent2); font-weight: 500; }
.msg.user .msg-bub strong { color: white; }
.typing { display: flex; gap: 3px; padding: 2px 0; }
.typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dot 1.1s infinite; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
.ai-chips { padding: 0 16px 10px; display: flex; gap: 5px; flex-wrap: wrap; }
.chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; font-family: var(--font); transition: all .12s; white-space: nowrap; }
.chip:hover { border-color: var(--accent); color: var(--accent2); }
.ai-inp-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.ai-inp { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: var(--font); outline: none; }
.ai-inp:focus { border-color: var(--accent); }
.ai-inp::placeholder { color: var(--muted); }
.ai-send { background: var(--accent); border: none; border-radius: 6px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .12s; }
.ai-send:hover { background: #2563EB; }
.ai-send svg { width: 14px; height: 14px; fill: white; }

/* PRIORITY BADGE */
.priority { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-weight: 500; margin-left: 6px; vertical-align: middle; }
.p-high { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.p-med { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: var(--gold); }
.p-dev { background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.2); color: var(--purple); }

/* DIVIDER */
.div { height: 1px; background: var(--border); margin: 16px 0; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(8,12,22,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 24px;
  max-width: 480px;
  width: calc(100% - 32px);
}
.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  margin-bottom: 20px;
}
.modal-hdr h2 {
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}
.modal-hdr-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
}
.modal-body { display: flex; flex-direction: column; gap: 16px; }
.modal-ftr {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 11px; font-weight: 500; color: var(--muted); }
.form-input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--font);
  outline: none;
  width: 100%;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--muted); }
.form-error { font-size: 11px; color: var(--red); display: none; }
.form-error.show { display: block; }

/* BUTTON VARIANTS */
.btn { border-radius: 6px; padding: 7px 16px; font-size: 13px; font-family: var(--font); cursor: pointer; border: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563EB; }
.btn-primary:disabled { opacity: 0.6; pointer-events: none; }
.btn-secondary { background: transparent; border: 1px solid var(--border2); color: var(--muted); }
.btn-secondary:hover { background: rgba(255,255,255,0.04); }
.btn-destructive { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
.btn-destructive:hover { background: rgba(239,68,68,0.08); }

/* SIDEBAR ADD */
.sidebar-add {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  margin-top: auto;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border-left: none;
  border-right: none;
  border-bottom: none;
  width: 100%;
  font-family: var(--font);
}
.sidebar-add:hover { color: var(--text); background: rgba(255,255,255,0.03); }

/* ACCOUNT HEADER ACTIONS */
.acct-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; opacity: 0.4; transition: opacity 0.15s; }
.acct-header:hover .acct-actions { opacity: 1; }
.acct-action-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 4px 8px;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font);
}
.acct-action-btn:hover { border-color: var(--border2); color: var(--text); }
.acct-action-btn.del:hover { border-color: rgba(239,68,68,0.3); color: var(--red); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-state h3 { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* CONTACT GRID & CARDS */
.contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.contact-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.12s; border-left: 3px solid transparent; }
.contact-card:hover { border-color: rgba(59,130,246,0.3); }
.contact-card.expanded { border-left-color: var(--accent); }
.contact-card-hdr { display: flex; align-items: center; gap: 8px; }
.contact-av { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: white; flex-shrink: 0; }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 13px; font-weight: 500; }
.contact-title { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contact-badges { display: flex; gap: 4px; flex-shrink: 0; }

/* INFLUENCE BADGES */
.influence-badge { display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.influence-champion { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.influence-evaluator { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: var(--gold); }
.influence-blocker { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }

/* STALENESS BADGES */
.stale-badge { display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; letter-spacing: 0.05em; }
.stale-fresh { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.stale-aging { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: var(--gold); }
.stale-stale { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }

/* INFLUENCE GROUP HEADERS */
.contact-group { margin-bottom: 24px; }
.contact-group-hdr { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* CONTACTS HEADER */
.contacts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.contacts-count { font-size: 13px; color: var(--muted); }

/* CONTACT DETAIL VIEW */
.contact-detail { padding: 16px 0 0; margin-top: 8px; border-top: 1px solid var(--border); display: none; }
.contact-detail.show { display: block; }
.contact-section { margin-bottom: 16px; }
.contact-section-hdr { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent2); margin-bottom: 8px; }
.contact-section-body { font-size: 13px; line-height: 1.6; color: var(--text); }
.contact-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 16px; }
.contact-field-label { font-size: 11px; color: var(--muted); }
.contact-field-value { font-size: 13px; color: var(--text); }
.contact-actions { display: flex; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 16px; }

/* AI CONTENT BLOCK & GENERATE BUTTON */
.ai-content-block { background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.16); border-left: 3px solid var(--accent); border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.6; }
.contact-generate-btn { background: var(--accent); border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-family: var(--font); color: #fff; cursor: pointer; transition: background 0.12s; }
.contact-generate-btn:hover { background: #2563EB; }
.contact-generate-btn:disabled { opacity: 0.6; pointer-events: none; }

/* OUTREACH LIST & FORM */
.outreach-list { display: flex; flex-direction: column; gap: 8px; }
.outreach-entry { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.outreach-entry:last-child { border-bottom: none; }
.outreach-date { font-size: 11px; font-family: var(--mono); color: var(--muted); min-width: 72px; flex-shrink: 0; }
.outreach-body { flex: 1; }
.outreach-tags { display: flex; gap: 4px; margin-bottom: 4px; }
.outreach-tag { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-weight: 500; }
.outreach-notes { font-size: 13px; color: var(--text); line-height: 1.5; }
.outreach-form { display: flex; flex-direction: column; gap: 8px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-top: 8px; }
.outreach-form-row { display: flex; gap: 8px; }
.outreach-form-ftr { display: flex; justify-content: flex-end; gap: 8px; }

/* CONTACTS EMPTY STATE */
.contacts-empty { text-align: center; padding: 48px 16px; color: var(--muted); }
.contacts-empty h3 { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 8px; }

/* ACTIVITY TAB */
.activity-form { display: flex; flex-direction: column; gap: 10px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; }
.activity-form-row { display: flex; gap: 8px; align-items: center; }
.activity-form select, .activity-form input, .activity-form textarea { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: var(--font); outline: none; }
.activity-form select:focus, .activity-form input:focus, .activity-form textarea:focus { border-color: var(--accent); }
.activity-form select { min-width: 120px; }
.activity-form input { flex: 1; }
.activity-form textarea { width: 100%; min-height: 80px; resize: vertical; line-height: 1.5; }
.activity-form-ftr { display: flex; justify-content: space-between; align-items: center; }
.activity-form-error { font-size: 12px; color: var(--red); display: none; }
.activity-form-error.show { display: block; }
.activity-form-btn { background: var(--accent); border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; color: white; cursor: pointer; font-family: var(--font); }
.activity-form-btn:hover { background: #2563EB; }

.debrief-area { margin-bottom: 20px; }
.activity-timeline { display: flex; flex-direction: column; gap: 12px; }
.activity-entry { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; border-left: 3px solid var(--muted); }
.activity-entry[data-type="meeting"] { border-left-color: #3B82F6; }
.activity-entry[data-type="call"] { border-left-color: #22C55E; }
.activity-entry[data-type="email"] { border-left-color: #F59E0B; }
.activity-entry[data-type="note"] { border-left-color: #94A3B8; }
.activity-entry[data-type="other"] { border-left-color: #A78BFA; }
.activity-entry-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.activity-type { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; text-transform: capitalize; }
.activity-type[data-type="meeting"] { background: rgba(59,130,246,0.15); color: #3B82F6; }
.activity-type[data-type="call"] { background: rgba(34,197,94,0.15); color: #22C55E; }
.activity-type[data-type="email"] { background: rgba(245,158,11,0.15); color: #F59E0B; }
.activity-type[data-type="note"] { background: rgba(148,163,184,0.15); color: #94A3B8; }
.activity-type[data-type="other"] { background: rgba(167,139,250,0.15); color: #A78BFA; }
.activity-ai-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; background: rgba(167,139,250,0.2); color: var(--purple); font-family: var(--mono); font-weight: 500; }
.activity-meta { font-size: 12px; color: var(--muted); }
.activity-participants { font-size: 13px; color: var(--accent2); margin-bottom: 4px; }
.activity-summary { font-size: 13px; color: var(--text); line-height: 1.6; }
.activity-contacts-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.activity-contact-tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; background: rgba(59,130,246,0.1); color: var(--accent2); font-family: var(--mono); }
.activity-empty { text-align: center; padding: 48px 16px; color: var(--muted); }
.activity-empty h3 { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.activity-empty p { font-size: 13px; }

@media (max-width: 900px) {
  .sidebar { display: none; }
  .g2,.g3,.g4 { grid-template-columns: 1fr; }
  .acct-header { padding: 20px 16px; }
  .acct-content { padding: 16px; }
  .contact-grid { grid-template-columns: 1fr; }
  .contact-fields { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-logo">Grid Dynamics <span>/ Intel Hub</span></div>
  <input class="topnav-search" id="acctSearch" placeholder="Search accounts..." oninput="filterAccounts(this.value)" />
  <div class="topnav-count" id="acctCount">0 accounts</div>
</nav>

<div class="layout">
<aside class="sidebar" id="sidebar">
  <!-- Populated by loadAccounts() -->
</aside>

<main class="main" id="mainContent">
  <!-- Populated by renderAccountPanel() -->
</main>
</div>

<!-- Account Add/Edit Modal -->
<div class="modal-overlay" id="accountModal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <h2 id="modalTitle">Add Account</h2>

    <div class="modal-body">
      <input type="hidden" id="modalAccountId" value="">
      <div class="form-group">
        <label class="form-label">Company name</label>
        <input class="form-input" id="modalName" placeholder="e.g. Acme Corporation" />
      </div>
      <div class="form-group">
        <label class="form-label">Sector</label>
        <input class="form-input" id="modalSector" placeholder="e.g. Automotive OEM" />
      </div>
      <div class="form-group">
        <label class="form-label">Annual revenue (e.g. $12.6B)</label>
        <input class="form-input" id="modalRevenue" placeholder="e.g. $12.6B" />
      </div>
      <div class="form-group">
        <label class="form-label">Employees (e.g. 72,000)</label>

        <label class="form-label">AI context (account intelligence for Claude)</label>

      </div>

</div>

<!-- Remove Confirmation Modal -->
<div class="modal-overlay" id="removeModal" onclick="closeRemoveModal()">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:400px">
    <div class="modal-hdr">
      <h2>Remove this account?</h2>
      <button class="modal-hdr-close" onclick="closeRemoveModal()">&times;</button>

<!-- Contact Add/Edit Modal -->

<!-- Contact Delete Confirmation Modal -->

  <div class="modal" onclick="event.stopPropagation()" style="max-width:400px">
    <div class="modal-hdr">
      <h2>Delete this contact?</h2>
      <button class="modal-hdr-close" onclick="closeContactRemoveModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p id="contactRemoveMsg" style="font-size:13px;color:var(--text)"></p>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-secondary" onclick="closeContactRemoveModal()">Discard Changes</button>
      <button class="btn btn-destructive" id="contactRemoveBtn" onclick="confirmDeleteContact()">Delete Contact</button>
    </div>
  </div>

<script>
let accounts = [];
let chatHistories = {};
let currentAccount = null;
let editingAccountId = null;
let removingAccountId = null;

// ---- XSS Protection (T-02-01, T-02-02) ----
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ---- Data Loading ----
async function loadAccounts() {
  try {
    const res = await fetch('/api/accounts');
    accounts = await res.json();
  } catch (e) {
    accounts = [];
  }
  renderSidebar();
  if (accounts.length > 0) {
    showAccount(accounts[0].id);
  } else {
    renderEmptyState();
  }
  document.getElementById('acctCount').textContent = accounts.length + ' account' + (accounts.length !== 1 ? 's' : '');
}

// ---- Sidebar Rendering ----
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  var groups = {};
  accounts.forEach(function(a) {
    if (!groups[a.sector]) groups[a.sector] = [];
    groups[a.sector].push(a);
  });
  var html = '<div class="sidebar-items">';
  var sectors = Object.keys(groups);
  for (var i = 0; i < sectors.length; i++) {
    var sector = sectors[i];
    var items = groups[sector];
    html += '<div class="sidebar-section">' + escapeHtml(sector) + '</div>';
    for (var j = 0; j < items.length; j++) {
      var a = items[j];
      var shortName = getShortName(a.name);
      html += '<button class="sidebar-item" onclick="showAccount(\'' + escapeHtml(a.id) + '\')" id="sb-' + escapeHtml(a.id) + '">';
      html += '<span class="sidebar-dot" style="background:' + escapeHtml(a.dot_color || '#3B82F6') + '"></span>';
      html += escapeHtml(shortName);
      html += '<span class="sidebar-revenue">' + escapeHtml(a.display_revenue || '') + '</span>';
      html += '</button>';
    }
  }
  html += '</div>';
  html += '<button class="sidebar-add" onclick="openAddModal()">+ Add Account</button>';
  sidebar.innerHTML = html;
}

function getShortName(name) {
  if (!name) return '';
  // Remove common corporate suffixes for a cleaner sidebar label
  return name
    .replace(/\s+(Company|GmbH|International|SE|Group AG|Inc\.?|Corp\.?|LLC|Ltd\.?|Automotive|Holdings?)$/i, '')
    .replace(/\s*\(.*?\)\s*$/, '')
    .trim();
}

// ---- Account Panel Rendering ----
function renderAccountPanel(account) {
  var a = account;
  var id = escapeHtml(a.id);
  var name = escapeHtml(a.name);
  var sector = escapeHtml(a.sector || '');
  var hq = escapeHtml(a.hq || '');
  var revenue = escapeHtml(a.revenue || '');
  var employees = escapeHtml(a.employees || '');
  var context = escapeHtml(a.context || '');

  var html = '<div class="account-panel" id="panel-' + id + '">';
  html += '<div class="acct-header">';
  html += '<div class="acct-tag">Account Intelligence &middot; ' + sector + '</div>';
  html += '<div style="display:flex;align-items:flex-start;gap:16px">';
  html += '<div class="acct-name"><strong>' + name + '</strong></div>';
  html += '<div class="acct-actions">';
  html += '<button class="acct-action-btn" onclick="openEditModal(\'' + id + '\')">Edit Account</button>';
  html += '<button class="acct-action-btn del" onclick="openRemoveModal(\'' + id + '\')">Remove Account</button>';
  html += '</div>';
  html += '</div>';
  html += '<div class="acct-sub">' + hq + '</div>';
  html += '<div class="acct-kpis">';
  html += '<div><div class="kpi-val">' + revenue + '</div><div class="kpi-label">Revenue</div></div>';
  html += '<div><div class="kpi-val">' + employees + '</div><div class="kpi-label">Employees</div></div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="acct-tabs">';
  html += '<button class="acct-tab active" onclick="showTab(\'' + id + '\',\'overview\',this)">Overview</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'contacts\',this)">Contacts</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'activity\',this)">Activity</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'ai\',this)">Ask AI</button>';
  html += '</div>';

  html += '<div class="acct-content">';
  // Overview tab
  html += '<div class="tab-pane active" id="' + id + '-overview">';
  // SECURITY: escapeHtml MUST run before any .replace() that injects HTML tags.
  html += '<div class="hl"><div class="hl-label">Account Intelligence</div>' + escapeHtml(context).replace(/\n/g, '<br>') + '</div>';
  html += '</div>';
  // Contacts tab
  html += '<div class="tab-pane" id="' + id + '-contacts"><div id="' + id + '-contacts-panel"></div></div>';
  // Activity tab
  html += '<div class="tab-pane" id="' + id + '-activity">';
  html += '<div id="' + id + '-activity-panel"></div>';
  html += '</div>';
  // AI tab
  html += '<div class="tab-pane" id="' + id + '-ai"><div id="' + id + '-ai-panel"></div></div>';
  html += '</div>';

  html += '</div>';

  var mainContent = document.getElementById('mainContent');
  var temp = document.createElement('div');
  temp.innerHTML = html;
  mainContent.appendChild(temp.firstChild);
}

// ---- Show Account ----
function showAccount(id) {
  document.querySelectorAll('.account-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.sidebar-item').forEach(function(b) { b.classList.remove('active'); });

  // Render panel if it doesn't exist yet
  if (!document.getElementById('panel-' + id)) {
    var acct = accounts.find(function(a) { return a.id === id; });
    if (acct) renderAccountPanel(acct);
  }

  var panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');

  var sbItem = document.getElementById('sb-' + id);
  if (sbItem) sbItem.classList.add('active');

  currentAccount = id;

  // Init AI panel if needed
  if (!chatHistories[id]) {
    chatHistories[id] = [];
    initAIPanel(id);
  }
}

// ---- Show Tab ----
function showTab(account, tab, btn) {
  var panel = document.getElementById('panel-' + account);
  if (!panel) return;
  panel.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
  panel.querySelectorAll('.acct-tab').forEach(function(b) { b.classList.remove('active'); });
  var pane = document.getElementById(account + '-' + tab);
  if (pane) pane.classList.add('active');
  if (btn) btn.classList.add('active');
  if (tab === 'ai' && !chatHistories[account]) {
    chatHistories[account] = [];
    initAIPanel(account);
  }
  if (tab === 'contacts') {
    var contactsPanel = document.getElementById(account + '-contacts-panel');
    if (contactsPanel && !contactsPanel.dataset.loaded) {
      contactsPanel.dataset.loaded = '1';
      loadContacts(account);
    }
  }
  if (tab === 'activity') {
    var activityPanel = document.getElementById(account + '-activity-panel');
    if (activityPanel && !activityPanel.dataset.loaded) {
      activityPanel.dataset.loaded = '1';
      loadActivity(account);
    }
  }
}

// ---- AI Panel ----
function initAIPanel(id) {
  var container = document.getElementById(id + '-ai-panel');
  if (!container || container.innerHTML !== '') return;
  var acct = accounts.find(function(a) { return a.id === id; });
  if (!acct) return;
  var safeName = escapeHtml(acct.name);
  var safeId = escapeHtml(id);
  container.innerHTML =
    '<div class="ai-panel">' +
      '<div class="ai-hdr"><div class="ai-dot"></div><div class="ai-hdr-txt">Account AI &mdash; ' + safeName + '</div><div class="ai-hdr-sub">Claude &middot; GD context loaded</div></div>' +
      '<div class="ai-msgs" id="msgs-' + safeId + '">' +
        '<div class="msg ai"><div class="msg-av ai">AI</div><div class="msg-bub">Ask anything about ' + safeName + '.</div></div>' +
      '</div>' +
      '<div class="ai-chips" id="chips-' + safeId + '">' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">Where does GD start here?</button>' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">Who should we contact first?</button>' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">What is the best differentiator vs large SIs?</button>' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">Draft an opening outreach email</button>' +
      '</div>' +
      '<div class="ai-inp-area">' +
        '<input class="ai-inp" id="inp-' + safeId + '" type="text" placeholder="Ask about ' + safeName + '..." onkeydown="if(event.key===\'Enter\') sendMsg(\'' + safeId + '\')" />' +
        '<button class="ai-send" onclick="sendMsg(\'' + safeId + '\')" aria-label="Send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>' +
      '</div>' +
    '</div>';
  loadChatHistory(id);
}

async function loadChatHistory(id) {
  try {
    var res = await fetch('/api/accounts/' + id + '/chat');
    var messages = await res.json();
    if (messages.length === 0) return;
    // Populate in-memory chatHistories from DB
    chatHistories[id] = messages.map(function(m) { return { role: m.role, content: m.content }; });
    // Clear the default welcome message and render saved messages
    var msgsContainer = document.getElementById('msgs-' + id);
    if (!msgsContainer) return;
    msgsContainer.innerHTML = '';
    messages.forEach(function(m) {
      addMsg(id, m.role === 'user' ? 'user' : 'ai', m.content);
    });
    // Hide chips if there is existing history
    var chips = document.getElementById('chips-' + id);
    if (chips) chips.style.display = 'none';
  } catch (e) {
    console.error('Failed to load chat history:', e);
  }
}

function saveChatMessage(accountId, role, content) {
  fetch('/api/accounts/' + accountId + '/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: role, content: content })
  }).catch(function(e) { console.error('Failed to save chat message:', e); });
}

function sendChip(id, btn) {
  document.getElementById('inp-' + id).value = btn.textContent;
  sendMsg(id);
}

async function sendMsg(id) {
  var inp = document.getElementById('inp-' + id);
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  var chipsEl = document.getElementById('chips-' + id);
  if (chipsEl) chipsEl.style.display = 'none';
  addMsg(id, 'user', text);
  if (!chatHistories[id]) chatHistories[id] = [];
  chatHistories[id].push({ role: 'user', content: text });
  saveChatMessage(id, 'user', text);
  var typingId = addTyping(id);

  try {
    var messages = chatHistories[id].map(function(m) { return { role: m.role, content: m.content }; });
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: 'You are an account intelligence assistant for Grid Dynamics. Be direct, specific, and actionable. No em dashes or double hyphens.',
        messages: messages,
        account_id: id
      })
    });
    var data = await res.json();
    removeTyping(id, typingId);
    var reply = data.content && data.content[0] ? data.content[0].text : 'Unable to get a response. Please try again.';
    chatHistories[id].push({ role: 'assistant', content: reply });
    saveChatMessage(id, 'assistant', reply);
    addMsg(id, 'ai', reply);
  } catch(e) {
    removeTyping(id, typingId);
    addMsg(id, 'ai', 'There was an error. Please try again.');
  }
}

function addMsg(id, role, text) {
  var msgs = document.getElementById('msgs-' + id);
  if (!msgs) return;
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  var av = role === 'ai' ? 'AI' : 'DZ';
  // SECURITY: escapeHtml MUST run before any .replace() that injects HTML tags.
  // The captured groups contain already-escaped text, so this is safe.
  var fmt = escapeHtml(text).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  div.innerHTML = '<div class="msg-av ' + role + '">' + av + '</div><div class="msg-bub">' + fmt + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ---- Modal: Save Account ----
async function saveAccount() {
  var name = document.getElementById('modalName').value.trim();
  if (!name) {
    showModalError('Company name is required.');
    return;
  }

  var btn = document.getElementById('modalSaveBtn');
  var originalText = btn.textContent;
  btn.textContent = 'Saving...';
  btn.disabled = true;
  hideModalError();

  var payload = {
    name: name,
    sector: document.getElementById('modalSector').value.trim(),
    revenue: document.getElementById('modalRevenue').value.trim(),
    employees: document.getElementById('modalEmployees').value.trim(),
    hq: document.getElementById('modalHQ').value.trim(),
    context: document.getElementById('modalContext').value.trim()
  };

  try {
    var url, method;
    if (editingAccountId) {
      url = '/api/accounts/' + editingAccountId;
      method = 'PUT';
    } else {
      url = '/api/accounts';
      method = 'POST';
    }

    var res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      throw new Error('Server error');
    }

    var saved = await res.json();
    closeModal();

    // Clear rendered panels so they re-render with fresh data
    document.getElementById('mainContent').innerHTML = '';

    await loadAccounts();

    // Select the saved account
    showAccount(saved.id);
  } catch (e) {
    showModalError("Couldn't save. Check your connection and try again.");
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

// ---- Contact Staleness Helpers (D-12) ----
function getStalenessClass(researchedAt) {
  if (!researchedAt) return 'stale-stale';
  var now = new Date();
  var researched = new Date(researchedAt);
  var days = Math.floor((now - researched) / (1000 * 60 * 60 * 24));
  if (days < 30) return 'stale-fresh';
  if (days < 90) return 'stale-aging';
  return 'stale-stale';
}

function getStalenessLabel(researchedAt) {
  if (!researchedAt) return 'STALE';
  var now = new Date();
  var researched = new Date(researchedAt);
  var days = Math.floor((now - researched) / (1000 * 60 * 60 * 24));
  if (days < 30) return 'FRESH';
  if (days < 90) return 'AGING';
  return 'STALE';
}

// ---- Contact Card Rendering (D-02) ----
function renderContactCard(contact) {
  var c = contact;
  var words = escapeHtml(c.name).split(' ');
  var initials = words.map(function(w) { return w.charAt(0); }).join('').substring(0, 2).toUpperCase();
  var influenceClass = 'influence-' + escapeHtml(c.influence).toLowerCase();
  var staleClass = getStalenessClass(c.researched_at);

  var html = '<div class="contact-card" id="contact-card-' + c.id + '" onclick="toggleContactDetail(' + c.id + ',\'' + escapeHtml(c.account_id) + '\')">';

  html += '<span class="influence-badge ' + influenceClass + '">' + escapeHtml(c.influence) + '</span>';

  html += '</div>';

  html += '<div class="contact-detail" id="contact-detail-' + c.id + '"></div>';

// ---- Contact Grid Rendering (D-01) ----
function renderContactsGrid(accountId, contacts) {
  var panel = document.getElementById(accountId + '-contacts-panel');
  if (!panel) return;

  var html = '<div class="contacts-header">';
  html += '<span class="contacts-count">' + contacts.length + (contacts.length === 1 ? ' contact' : ' contacts') + '</span>';
  html += '<button class="btn btn-primary" onclick="openAddContactModal(\'' + escapeHtml(accountId) + '\')">Add Contact</button>';
  html += '</div>';

  if (contacts.length === 0) {
    html += '<div class="contacts-empty">';
    html += '<h3>No contacts yet</h3>';
    html += '<p>Add your first contact to start mapping decision-makers for this account.</p>';
    html += '<button class="btn btn-primary" onclick="openAddContactModal(\'' + escapeHtml(accountId) + '\')">Add Contact</button>';
    html += '</div>';
    panel.innerHTML = html;
    return;
  }

  var groups = { Champion: [], Evaluator: [], Blocker: [] };
  contacts.forEach(function(c) {
    if (groups[c.influence]) groups[c.influence].push(c);
  });

  var groupLabels = { Champion: 'Champions', Evaluator: 'Evaluators', Blocker: 'Blockers' };
  var groupOrder = ['Champion', 'Evaluator', 'Blocker'];

  groupOrder.forEach(function(influence) {
    if (groups[influence].length === 0) return;
    html += '<div class="contact-group">';
    html += '<div class="contact-group-hdr">' + groupLabels[influence] + '</div>';
    html += '<div class="contact-grid">';
    groups[influence].forEach(function(contact) {
      html += renderContactCard(contact);
    });
    html += '</div>';
    html += '</div>';
  });

  panel.innerHTML = html;
}

// ---- Contact Detail Toggle (D-03) ----
var expandedContactId = null;

function toggleContactDetail(contactId, accountId) {
  // Collapse currently expanded card
  if (expandedContactId && expandedContactId !== contactId) {
    var prevDetail = document.getElementById('contact-detail-' + expandedContactId);
    var prevCard = document.getElementById('contact-card-' + expandedContactId);
    if (prevDetail) prevDetail.classList.remove('show');
    if (prevCard) prevCard.classList.remove('expanded');
  }

  var detail = document.getElementById('contact-detail-' + contactId);
  var card = document.getElementById('contact-card-' + contactId);
  if (!detail || !card) return;

  if (detail.classList.contains('show')) {
    detail.classList.remove('show');
    card.classList.remove('expanded');
    expandedContactId = null;
  } else {
    // Load detail content if empty
    if (!detail.innerHTML) {
      loadContactDetail(contactId, accountId);
    }
    detail.classList.add('show');
    card.classList.add('expanded');
    expandedContactId = contactId;
  }
}

// ---- AI Generation & Outreach Logging (Plan 03) ----
function generateAI(contactId, accountId) {
  var rationaleBody = document.getElementById('rationale-body-' + contactId);
  var warmpathBody = document.getElementById('warmpath-body-' + contactId);

  // Show generating state on both sections
  if (rationaleBody) {
    rationaleBody.innerHTML = '<button class="contact-generate-btn" disabled>Generating...</button>';
  }
  if (warmpathBody) {
    warmpathBody.innerHTML = '<button class="contact-generate-btn" disabled>Generating...</button>';
  }

  fetch('/api/contacts/' + contactId + '/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  })
    .then(function(r) {
      if (!r.ok) throw new Error('Generate failed');
      return r.json();
    })
    .then(function(contact) {
      // Update rationale section
      if (rationaleBody) {
        var rHtml = '';
        if (contact.ai_rationale) {
          rHtml += '<div class="ai-content-block">' + escapeHtml(contact.ai_rationale).replace(/\n/g, '<br>') + '</div>';

        } else {
          rHtml += '<p style="color:var(--muted);font-size:13px;margin-bottom:8px">No outreach rationale generated yet.</p>';
          rHtml += '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Generate Rationale</button>';
        }
        rationaleBody.innerHTML = rHtml;
      }

      // Update warm path section
      if (warmpathBody) {
        var wHtml = '';
        if (contact.warm_path) {
          wHtml += '<div class="ai-content-block">' + escapeHtml(contact.warm_path).replace(/\n/g, '<br>') + '</div>';
          wHtml += '<div style="margin-top:8px"><a href="javascript:void(0)" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')" style="font-size:11px;color:var(--muted)">Refresh Warm Path</a></div>';
        } else {
          wHtml += '<p style="color:var(--muted);font-size:13px;margin-bottom:8px">No warm path identified yet.</p>';
          wHtml += '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Find Warm Path</button>';
        }
        warmpathBody.innerHTML = wHtml;
      }

      // Update staleness badge on the card (researched_at just updated)
      var card = document.getElementById('contact-card-' + contactId);
      if (card && contact.researched_at) {
        var staleBadge = card.querySelector('.stale-badge');
        if (staleBadge) {
          staleBadge.className = 'stale-badge ' + getStalenessClass(contact.researched_at);
          staleBadge.textContent = getStalenessLabel(contact.researched_at);
        }
      }
    })
    .catch(function() {
      if (rationaleBody) {
        rationaleBody.innerHTML = '<p style="color:var(--red);font-size:11px;margin-bottom:8px">Couldn\'t generate. Try again in a moment.</p>' +
          '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Generate Rationale</button>';
      }
      if (warmpathBody) {
        warmpathBody.innerHTML = '<p style="color:var(--red);font-size:11px;margin-bottom:8px">Couldn\'t generate. Try again in a moment.</p>' +
          '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Find Warm Path</button>';
      }
    });
}

function showOutreachForm(contactId) {
  var container = document.getElementById('outreach-form-container-' + contactId);
  var addLink = document.getElementById('outreach-add-link-' + contactId);
  if (!container) return;

  // Hide the "+ Log Outreach" link
  if (addLink) addLink.style.display = 'none';

  // Get today's date in YYYY-MM-DD format for the date input default
  var today = new Date().toISOString().split('T')[0];

  var html = '<div class="outreach-form" id="outreach-form-' + contactId + '">';
  html += '<div class="outreach-form-row">';
  html += '<input type="date" class="form-input" id="outreach-date-' + contactId + '" value="' + today + '" style="flex:1">';
  html += '<select class="form-input" id="outreach-channel-' + contactId + '" style="flex:1">';
  html += '<option value="">Channel</option>';
  html += '<option value="email">Email</option>';
  html += '<option value="linkedin">LinkedIn</option>';
  html += '<option value="phone">Phone</option>';
  html += '<option value="meeting">Meeting</option>';
  html += '<option value="other">Other</option>';
  html += '</select>';
  html += '<select class="form-input" id="outreach-outcome-' + contactId + '" style="flex:1">';
  html += '<option value="">Outcome</option>';
  html += '<option value="connected">Connected</option>';
  html += '<option value="no response">No Response</option>';
  html += '<option value="declined">Declined</option>';
  html += '<option value="meeting scheduled">Meeting Scheduled</option>';
  html += '</select>';
  html += '</div>';
  html += '<textarea class="form-input" id="outreach-notes-' + contactId + '" rows="2" placeholder="Notes (optional)" style="resize:vertical"></textarea>';
  html += '<div id="outreach-form-error-' + contactId + '" style="display:none;color:var(--red);font-size:11px"></div>';
  html += '<div class="outreach-form-ftr">';
  html += '<button class="btn btn-secondary" onclick="event.stopPropagation();hideOutreachForm(' + contactId + ')">Discard</button>';
  html += '<button class="btn btn-primary" id="outreach-save-' + contactId + '" onclick="event.stopPropagation();submitOutreach(' + contactId + ')">Log Outreach</button>';
  html += '</div>';
  html += '</div>';

  container.innerHTML = html;
}

function hideOutreachForm(contactId) {
  var container = document.getElementById('outreach-form-container-' + contactId);
  var addLink = document.getElementById('outreach-add-link-' + contactId);
  if (container) container.innerHTML = '';
  if (addLink) addLink.style.display = 'inline-block';
}

function submitOutreach(contactId) {
  var date = document.getElementById('outreach-date-' + contactId).value;
  var channel = document.getElementById('outreach-channel-' + contactId).value;
  var outcome = document.getElementById('outreach-outcome-' + contactId).value;
  var notes = document.getElementById('outreach-notes-' + contactId).value.trim();
  var errorEl = document.getElementById('outreach-form-error-' + contactId);

  // Validate required fields
  if (!date || !channel || !outcome) {
    if (errorEl) { errorEl.textContent = 'Date, channel, and outcome are required.'; errorEl.style.display = 'block'; }
    return;
  }

  var saveBtn = document.getElementById('outreach-save-' + contactId);
  if (saveBtn) { saveBtn.textContent = 'Saving...'; saveBtn.disabled = true; }

  fetch('/api/contacts/' + contactId + '/outreach', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: date, channel: channel, outcome: outcome, notes: notes })
  })
    .then(function(r) {
      if (!r.ok) throw new Error('Save failed');
      return r.json();
    })
    .then(function(entry) {
      // Hide the form
      hideOutreachForm(contactId);

      // Reload the outreach list by fetching the full contact
      fetch('/api/contacts/' + contactId)
        .then(function(r) { return r.json(); })
        .then(function(contact) {
          var listEl = document.getElementById('outreach-list-' + contactId);
          if (listEl && contact.outreach) {
            listEl.innerHTML = renderOutreachList(contact.outreach);
          }
        });
    })
    .catch(function() {
      if (errorEl) { errorEl.textContent = "Couldn't save. Check your connection and try again."; errorEl.style.display = 'block'; }
      if (saveBtn) { saveBtn.textContent = 'Log Outreach'; saveBtn.disabled = false; }
    });
}

// ---- Activity Tab ----

function formatActivityDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr.replace(' ', 'T') + (dateStr.indexOf('Z') === -1 && dateStr.indexOf('+') === -1 ? 'Z' : ''));
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var hours = d.getHours();
  var ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  if (hours === 0) hours = 12;
  var mins = d.getMinutes();
  var minStr = mins < 10 ? '0' + mins : '' + mins;
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' ' + hours + ':' + minStr + ' ' + ampm;
}

function loadActivity(accountId) {
  var panel = document.getElementById(accountId + '-activity-panel');
  if (!panel) return;
  panel.innerHTML = '<p style="color:var(--muted);font-size:13px">Loading activity...</p>';

  fetch('/api/accounts/' + encodeURIComponent(accountId) + '/activity')
    .then(function(r) { return r.json(); })
    .then(function(entries) {
      var safeId = escapeHtml(accountId);
      var html = '';

      // Manual entry form
      html += '<div class="activity-form" id="' + safeId + '-activity-form">';
      html += '<div style="font-size:14px;font-weight:500;margin-bottom:2px">Log Activity</div>';
      html += '<div class="activity-form-row">';
      html += '<select id="' + safeId + '-activity-type">';
      html += '<option value="meeting">Meeting</option>';
      html += '<option value="call">Call</option>';
      html += '<option value="email">Email</option>';
      html += '<option value="note">Note</option>';
      html += '<option value="other">Other</option>';
      html += '</select>';
      html += '<input type="text" id="' + safeId + '-activity-participants" placeholder="Who was involved?" />';
      html += '</div>';
      html += '<textarea id="' + safeId + '-activity-summary" placeholder="What happened? Key takeaways and action items..."></textarea>';
      html += '<div class="activity-form-ftr">';
      html += '<div class="activity-form-error" id="' + safeId + '-activity-error"></div>';
      html += '<button class="activity-form-btn" id="' + safeId + '-activity-submit" onclick="submitActivity(\'' + safeId + '\')">Log Entry</button>';
      html += '</div>';
      html += '</div>';

      // Debrief area placeholder for Plan 03
      html += '<div class="debrief-area" id="' + safeId + '-debrief-area"></div>';

      // Timeline
      html += '<div id="' + safeId + '-activity-timeline">';
      html += renderActivityTimeline(accountId, entries);
      html += '</div>';

      panel.innerHTML = html;
    })
    .catch(function() {
      if (panel) panel.innerHTML = '<p style="color:var(--red);font-size:13px">Something went wrong. Reload the page and try again.</p>';
    });
}

function renderActivityTimeline(accountId, entries) {
  if (!entries || entries.length === 0) {
    return '<div class="activity-empty"><h3>No activity yet</h3><p>No activity logged yet. Use the form above to log your first pursuit activity.</p></div>';
  }
  var html = '<div class="activity-timeline">';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var safeType = escapeHtml(e.type || 'other');
    html += '<div class="activity-entry" data-type="' + safeType + '">';
    html += '<div class="activity-entry-hdr">';
    html += '<span class="activity-type" data-type="' + safeType + '">' + safeType + '</span>';
    if (e.source === 'ai_debrief') {
      html += '<span class="activity-ai-badge">AI</span>';
    }
    html += '<span class="activity-meta">' + escapeHtml(formatActivityDate(e.created_at)) + '</span>';
    html += '</div>';
    if (e.participants && e.participants.trim()) {
      html += '<div class="activity-participants">' + escapeHtml(e.participants) + '</div>';
    }
    html += '<div class="activity-summary">' + escapeHtml(e.summary).replace(/\n/g, '<br>') + '</div>';
    if (e.linked_contacts) {
      try {
        var contactIds = JSON.parse(e.linked_contacts);
        if (Array.isArray(contactIds) && contactIds.length > 0) {
          html += '<div class="activity-contacts-tags">';
          for (var j = 0; j < contactIds.length; j++) {
            html += '<span class="activity-contact-tag">Contact #' + escapeHtml(String(contactIds[j])) + '</span>';
          }
          html += '</div>';
        }
      } catch (ex) { /* ignore malformed linked_contacts */ }
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function submitActivity(accountId) {
  var typeEl = document.getElementById(accountId + '-activity-type');
  var participantsEl = document.getElementById(accountId + '-activity-participants');
  var summaryEl = document.getElementById(accountId + '-activity-summary');
  var errorEl = document.getElementById(accountId + '-activity-error');
  var submitBtn = document.getElementById(accountId + '-activity-submit');
  if (!typeEl || !summaryEl) return;

  var type = typeEl.value;
  var participants = participantsEl ? participantsEl.value.trim() : '';
  var summary = summaryEl.value.trim();

  // Validate
  if (!summary) {
    if (errorEl) { errorEl.textContent = 'Summary is required.'; errorEl.classList.add('show'); }
    return;
  }
  if (errorEl) { errorEl.classList.remove('show'); }
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving...'; }

  fetch('/api/accounts/' + encodeURIComponent(accountId) + '/activity', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: type, participants: participants, summary: summary, source: 'manual' })
  })
    .then(function(r) {
      if (!r.ok) throw new Error('Server error');
      return r.json();
    })
    .then(function(entry) {
      // Clear form
      if (summaryEl) summaryEl.value = '';
      if (participantsEl) participantsEl.value = '';
      if (typeEl) typeEl.value = 'meeting';
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Log Entry'; }

      // Prepend to timeline
      var timelineEl = document.getElementById(accountId + '-activity-timeline');
      if (timelineEl) {
        var existingTimeline = timelineEl.querySelector('.activity-timeline');
        var emptyState = timelineEl.querySelector('.activity-empty');
        if (emptyState) {
          // Replace empty state with a new timeline
          timelineEl.innerHTML = renderActivityTimeline(accountId, [entry]);
        } else if (existingTimeline) {
          // Prepend new entry
          var safeType = escapeHtml(entry.type || 'other');
          var entryHtml = '<div class="activity-entry" data-type="' + safeType + '">';
          entryHtml += '<div class="activity-entry-hdr">';
          entryHtml += '<span class="activity-type" data-type="' + safeType + '">' + safeType + '</span>';
          if (entry.source === 'ai_debrief') {
            entryHtml += '<span class="activity-ai-badge">AI</span>';
          }
          entryHtml += '<span class="activity-meta">' + escapeHtml(formatActivityDate(entry.created_at)) + '</span>';
          entryHtml += '</div>';
          if (entry.participants && entry.participants.trim()) {
            entryHtml += '<div class="activity-participants">' + escapeHtml(entry.participants) + '</div>';
          }
          entryHtml += '<div class="activity-summary">' + escapeHtml(entry.summary).replace(/\n/g, '<br>') + '</div>';
          entryHtml += '</div>';
          existingTimeline.insertAdjacentHTML('afterbegin', entryHtml);
        } else {
          timelineEl.innerHTML = renderActivityTimeline(accountId, [entry]);
        }
      }
    })
    .catch(function() {
      if (errorEl) { errorEl.textContent = "Couldn't save. Check your connection and try again."; errorEl.classList.add('show'); }
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Log Entry'; }
    });
}
