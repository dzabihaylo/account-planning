<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Dynamics | Prospect Intelligence Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap');
:root {
  --dark: #080C16;
  --mid: #0F1525;
  --surface: #141B2D;
  --card: #1A2236;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #EEF2FF;
  --muted: #7C8DB5;
  --accent: #3B82F6;
  --accent2: #60A5FA;
  --green: #22C55E;
  --gold: #F59E0B;
  --red: #EF4444;
  --teal: #14B8A6;
  --purple: #A78BFA;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--dark); color: var(--text); min-height: 100vh; }

/* TOP NAV */
.topnav {
  background: rgba(8,12,22,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topnav-logo { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.06em; white-space: nowrap; }
.topnav-logo span { color: var(--accent2); }
.topnav-search {
  flex: 1;
  max-width: 320px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--font);
  outline: none;
}
.topnav-search:focus { border-color: var(--accent); }
.topnav-search::placeholder { color: var(--muted); }
.topnav-count { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-left: auto; }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 52px); }

/* SIDEBAR */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--mid);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  display: flex;
  flex-direction: column;
}
.sidebar-section { padding: 0 12px 8px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; user-select: none; }
.sidebar-section:hover { color: var(--text); }
.sidebar-section-chevron { font-size: 9px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
.sidebar-section.collapsed .sidebar-section-chevron { transform: rotate(-90deg); }
.sidebar-group.collapsed { display: none; }
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font);
}
.sidebar-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.sidebar-item.active { background: rgba(59,130,246,0.08); color: var(--accent2); border-left: 2px solid var(--accent); }
.sidebar-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sidebar-revenue { font-size: 11px; color: var(--muted); margin-left: auto; font-family: var(--mono); }

/* MAIN */
.main { flex: 1; overflow: hidden; }

/* ACCOUNT PANEL */
.account-panel { display: none; }
.account-panel.active { display: block; }

/* ACCOUNT HEADER */
.acct-header {
  background: linear-gradient(135deg, var(--mid) 0%, var(--surface) 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 32px 24px;
  position: relative;
  overflow: hidden;
}
.acct-header::after {
  content: '';
  position: absolute;
  right: -60px;
  top: -60px;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  pointer-events: none;
}
.acct-tag { font-family: var(--mono); font-size: 11px; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.acct-name { font-size: 28px; font-weight: 300; letter-spacing: -0.3px; line-height: 1.15; margin-bottom: 4px; }
.acct-name strong { font-weight: 500; }
.acct-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.acct-kpis { display: flex; gap: 28px; flex-wrap: wrap; }
.kpi-val { font-size: 20px; font-weight: 500; line-height: 1; }
.kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.kpi-delta { font-size: 11px; margin-top: 2px; }

/* TABS */
.acct-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  gap: 2px;
  background: var(--mid);
  overflow-x: auto;
  scrollbar-width: none;
}
.acct-tabs::-webkit-scrollbar { display: none; }
.acct-tab {
  font-family: var(--font);
  font-size: 13px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 12px;
  height: 44px;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  position: relative;
  top: 1px;
  transition: color 0.12s;
}
.acct-tab:hover { color: var(--text); }
.acct-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

/* CONTENT */
.acct-content { padding: 24px 32px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}
.card-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 14px;
}
.section-header {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 8px;
}
.sidebar-rename-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--accent);
  color: var(--text);
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-family: var(--font);
  outline: none;
  width: 100%;
}
.gd-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text);
  animation: fi 0.15s ease;
  transition: opacity 0.15s;
}
.gd-toast-error { border-left: 3px solid var(--red); }
.gd-toast-success { border-left: 3px solid var(--green); }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 14px; }

/* STAT */
.stat-val { font-size: 20px; font-weight: 400; line-height: 1; }
.stat-val strong { font-weight: 500; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
.stat-delta { font-size: 11px; margin-top: 2px; }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.tag { font-size: 11px; padding: 3px 9px; border-radius: 4px; font-family: var(--mono); background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.18); color: #93C5FD; }
.tag.partner { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.18); color: #FCD34D; }
.tag.key { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); color: #86EFAC; }

/* SIGNALS */
.signal { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.signal:last-child { border-bottom: none; }
.sig-icon { width: 26px; height: 26px; border-radius: 5px; background: rgba(59,130,246,0.12); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.sig-body { flex: 1; }
.sig-text { color: var(--text); line-height: 1.5; }
.sig-meta { font-size: 11px; color: var(--accent2); font-family: var(--mono); margin-top: 3px; letter-spacing: 0.05em; }

/* HIGHLIGHT */
.hl {
  background: rgba(59,130,246,0.06);
  border: 1px solid rgba(59,130,246,0.16);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 14px;
}
.hl-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent2); margin-bottom: 4px; }

/* BAR */
.bar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 11px; }
.bar-label { flex: 1; color: var(--text); }
.bar-track { flex: 2; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; }
.bar-fill { height: 3px; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.bar-pct { min-width: 36px; text-align: right; color: var(--accent2); font-family: var(--mono); font-size: 11px; }

/* EXEC */
.exec-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 10px; }
.exec-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; transition: border-color 0.12s; }
.exec-card:hover { border-color: rgba(59,130,246,0.3); }
.exec-av { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--teal)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: white; margin-bottom: 8px; }
.exec-name { font-size: 13px; font-weight: 500; }
.exec-title { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.exec-loc { font-size: 11px; color: var(--accent2); font-family: var(--mono); margin-top: 5px; }
.exec-new { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); font-family: var(--mono); margin-top: 4px; }

/* CHART */
.chart-wrap { position: relative; width: 100%; }

/* AI */
.ai-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; height: 500px; }
.ai-hdr { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.ai-hdr-txt { font-size: 13px; font-weight: 500; }
.ai-hdr-sub { font-size: 11px; color: var(--muted); margin-left: auto; }
.ai-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.msg { display: flex; gap: 8px; align-items: flex-start; animation: fi .18s ease; }
@keyframes fi { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.msg.user { flex-direction: row-reverse; }
.msg-av { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; }
.msg-av.ai { background: linear-gradient(135deg,var(--accent),var(--teal)); color: white; }
.msg-av.user { background: rgba(255,255,255,0.08); color: var(--muted); }
.msg-bub { max-width: 80%; padding: 9px 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
.msg.ai .msg-bub { background: var(--card); border: 1px solid var(--border); border-top-left-radius: 2px; }
.msg.user .msg-bub { background: var(--accent); border-top-right-radius: 2px; color: white; }
.msg-bub strong { color: var(--accent2); font-weight: 500; }
.msg.user .msg-bub strong { color: white; }
.typing { display: flex; gap: 3px; padding: 2px 0; }
.typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dot 1.1s infinite; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
.ai-chips { padding: 0 16px 10px; display: flex; gap: 5px; flex-wrap: wrap; }
.chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; font-family: var(--font); transition: all .12s; white-space: nowrap; }
.chip:hover { border-color: var(--accent); color: var(--accent2); }
.ai-inp-area { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.ai-inp { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: var(--font); outline: none; }
.ai-inp:focus { border-color: var(--accent); }
.ai-inp::placeholder { color: var(--muted); }
.ai-send { background: var(--accent); border: none; border-radius: 6px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .12s; }
.ai-send:hover { background: #2563EB; }
.ai-send svg { width: 14px; height: 14px; fill: white; }

/* PRIORITY BADGE */
.priority { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; font-family: var(--mono); font-weight: 500; margin-left: 6px; vertical-align: middle; }
.p-high { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.p-med { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: var(--gold); }
.p-dev { background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.2); color: var(--purple); }

/* DIVIDER */
.div { height: 1px; background: var(--border); margin: 16px 0; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(8,12,22,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 24px;
  max-width: 480px;
  width: calc(100% - 32px);
}
.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  margin-bottom: 20px;
}
.modal-hdr h2 {
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}
.modal-hdr-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
}
.modal-body { display: flex; flex-direction: column; gap: 16px; }
.modal-ftr {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-size: 11px; font-weight: 500; color: var(--muted); }
.form-input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--font);
  outline: none;
  width: 100%;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--muted); }
.form-error { font-size: 11px; color: var(--red); display: none; }
.form-error.show { display: block; }

/* BUTTON VARIANTS */
.btn { border-radius: 6px; padding: 7px 16px; font-size: 13px; font-family: var(--font); cursor: pointer; border: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563EB; }
.btn-primary:disabled { opacity: 0.6; pointer-events: none; }
.btn-secondary { background: transparent; border: 1px solid var(--border2); color: var(--muted); }
.btn-secondary:hover { background: rgba(255,255,255,0.04); }
.btn-destructive { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
.btn-destructive:hover { background: rgba(239,68,68,0.08); }

/* SIDEBAR ADD */
.sidebar-add {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  margin-top: auto;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border-left: none;
  border-right: none;
  border-bottom: none;
  width: 100%;
  font-family: var(--font);
}
.sidebar-add:hover { color: var(--text); background: rgba(255,255,255,0.03); }

/* ACCOUNT HEADER ACTIONS */
.acct-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; opacity: 0.4; transition: opacity 0.15s; }
.acct-header:hover .acct-actions { opacity: 1; }
.acct-action-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 4px 8px;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--font);
}
.acct-action-btn:hover { border-color: var(--border2); color: var(--text); }
.acct-action-btn.del:hover { border-color: rgba(239,68,68,0.3); color: var(--red); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
.empty-state h3 { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* CONTACT GRID & CARDS */
.contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.contact-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.12s; border-left: 3px solid transparent; }
.contact-card:hover { border-color: rgba(59,130,246,0.3); }
.contact-card.expanded { border-left-color: var(--accent); }
.contact-card-hdr { display: flex; align-items: center; gap: 8px; }
.contact-av { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: white; flex-shrink: 0; }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 13px; font-weight: 500; }
.contact-title { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.contact-badges { display: flex; gap: 4px; flex-shrink: 0; }

/* INFLUENCE BADGES */
.influence-badge { display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.influence-champion { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.influence-evaluator { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: var(--gold); }
.influence-blocker { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }

/* STALENESS BADGES */
.stale-badge { display: inline-block; font-size: 11px; padding: 4px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; letter-spacing: 0.05em; }
.stale-fresh { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.stale-aging { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: var(--gold); }
.stale-stale { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }

/* REFRESH BUTTON & TOAST */
.refresh-btn { background: var(--accent); color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.15s; font-family: var(--font); }
.refresh-btn:hover { opacity: 0.85; }
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.refresh-toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 10000; animation: toastIn 0.3s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.refresh-toast-title { font-weight: 600; margin-bottom: 6px; color: var(--text); font-size: 13px; }
.refresh-toast-body { color: var(--muted); font-size: 11px; line-height: 1.5; }
.budget-indicator { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); margin-left: 12px; }
.budget-bar { width: 60px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }

/* INFLUENCE GROUP HEADERS */

.contact-group-hdr { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

/* CONTACTS HEADER */
.contacts-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.contacts-count { font-size: 13px; color: var(--muted); }

/* CONTACT DETAIL VIEW */

.contact-detail.show { display: block; }
.contact-section { margin-bottom: 16px; }
.contact-section-hdr { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent2); margin-bottom: 8px; }

.contact-actions { display: flex; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 16px; }

/* AI CONTENT BLOCK & GENERATE BUTTON */
.ai-content-block { background: rgba(59,130,246,0.06); border: 1px solid rgba(59,130,246,0.16); border-left: 3px solid var(--accent); border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.6; }
.contact-generate-btn { background: var(--accent); border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-family: var(--font); color: #fff; cursor: pointer; transition: background 0.12s; }
.contact-generate-btn:hover { background: #2563EB; }
.contact-generate-btn:disabled { opacity: 0.6; pointer-events: none; }

/* OUTREACH LIST & FORM */
.outreach-list { display: flex; flex-direction: column; gap: 8px; }
.outreach-entry { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.outreach-entry:last-child { border-bottom: none; }
.outreach-date { font-size: 11px; font-family: var(--mono); color: var(--muted); min-width: 72px; flex-shrink: 0; }
.outreach-body { flex: 1; }
.outreach-tags { display: flex; gap: 4px; margin-bottom: 4px; }
.outreach-tag { display: inline-block; font-size: 11px; padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-weight: 500; }
.outreach-notes { font-size: 13px; color: var(--text); line-height: 1.5; }
.outreach-form { display: flex; flex-direction: column; gap: 8px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-top: 8px; }
.outreach-form-row { display: flex; gap: 8px; }
.outreach-form-ftr { display: flex; justify-content: flex-end; gap: 8px; }

/* CONTACTS EMPTY STATE */
.contacts-empty { text-align: center; padding: 48px 16px; color: var(--muted); }
.contacts-empty h3 { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.contacts-empty p { font-size: 13px; margin-bottom: 16px; }

/* ACTIVITY TAB */
.activity-form { display: flex; flex-direction: column; gap: 10px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; }
.activity-form-row { display: flex; gap: 8px; align-items: center; }
.activity-form select, .activity-form input, .activity-form textarea { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: var(--font); outline: none; }
.activity-form select:focus, .activity-form input:focus, .activity-form textarea:focus { border-color: var(--accent); }
.activity-form select { min-width: 120px; }
.activity-form input { flex: 1; }
.activity-form textarea { width: 100%; min-height: 80px; resize: vertical; line-height: 1.5; }
.activity-form-ftr { display: flex; justify-content: space-between; align-items: center; }
.activity-form-error { font-size: 11px; color: var(--red); display: none; }
.activity-form-error.show { display: block; }
.activity-form-btn { background: var(--accent); border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; color: white; cursor: pointer; font-family: var(--font); }
.activity-form-btn:hover { background: #2563EB; }
.activity-form-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.debrief-area { margin-bottom: 20px; }
.debrief-textarea { width: 100%; min-height: 120px; resize: vertical; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 13px; color: var(--text); font-family: var(--font); line-height: 1.5; }
.debrief-textarea:focus { border-color: var(--accent); outline: none; }
.debrief-char-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
.debrief-actions { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
.debrief-extract-btn { background: #7C3AED; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; color: white; cursor: pointer; font-family: var(--font); }
.debrief-extract-btn:hover { background: #6D28D9; }
.debrief-extract-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.debrief-status { font-size: 11px; margin-top: 8px; }
.debrief-status.error { color: var(--red); }
.debrief-status.info { color: var(--muted); }
.debrief-loading { color: #7C3AED; font-style: italic; }
.review-panel { margin-top: 16px; }
.review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 10px 14px; background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2); border-radius: 8px; }
.review-header-title { font-size: 14px; font-weight: 500; color: var(--text); }
.review-header-btn { background: #22C55E; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 500; color: white; cursor: pointer; font-family: var(--font); }
.review-header-btn:hover { background: #16A34A; }
.review-header-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.proposal-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
.proposal-card-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.proposal-type-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; text-transform: capitalize; }
.proposal-type-badge[data-type="meeting"] { background: rgba(59,130,246,0.15); color: #3B82F6; }
.proposal-type-badge[data-type="call"] { background: rgba(34,197,94,0.15); color: #22C55E; }
.proposal-type-badge[data-type="email"] { background: rgba(245,158,11,0.15); color: #F59E0B; }
.proposal-type-badge[data-type="note"] { background: rgba(148,163,184,0.15); color: #94A3B8; }
.proposal-type-badge[data-type="other"] { background: rgba(167,139,250,0.15); color: #A78BFA; }
.proposal-field { margin-bottom: 8px; }
.proposal-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
.proposal-field input, .proposal-field textarea, .proposal-field select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; color: var(--text); font-family: var(--font); }
.proposal-field textarea { min-height: 60px; resize: vertical; line-height: 1.5; }
.proposal-field select { cursor: pointer; }
.proposal-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-approve { background: #22C55E; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 500; color: white; cursor: pointer; font-family: var(--font); }
.btn-approve:hover { background: #16A34A; }
.btn-reject { background: transparent; border: 1px solid var(--red); border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 500; color: var(--red); cursor: pointer; font-family: var(--font); }
.btn-reject:hover { background: rgba(239,68,68,0.1); }
.contact-proposal-card { background: var(--card); border: 1px solid rgba(124,58,237,0.3); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
.contact-proposal-card .proposal-card-hdr { color: #A78BFA; }
.contact-proposal-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; background: rgba(124,58,237,0.15); color: #7C3AED; text-transform: capitalize; }
.review-progress { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 6px; }
.activity-timeline { display: flex; flex-direction: column; gap: 12px; }
.activity-entry { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; border-left: 3px solid var(--muted); }
.activity-entry[data-type="meeting"] { border-left-color: #3B82F6; }
.activity-entry[data-type="call"] { border-left-color: #22C55E; }
.activity-entry[data-type="email"] { border-left-color: #F59E0B; }
.activity-entry[data-type="note"] { border-left-color: #94A3B8; }
.activity-entry[data-type="other"] { border-left-color: #A78BFA; }
.activity-entry-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.activity-type { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; text-transform: capitalize; }
.activity-type[data-type="meeting"] { background: rgba(59,130,246,0.15); color: #3B82F6; }
.activity-type[data-type="call"] { background: rgba(34,197,94,0.15); color: #22C55E; }
.activity-type[data-type="email"] { background: rgba(245,158,11,0.15); color: #F59E0B; }
.activity-type[data-type="note"] { background: rgba(148,163,184,0.15); color: #94A3B8; }
.activity-type[data-type="other"] { background: rgba(167,139,250,0.15); color: #A78BFA; }
.activity-ai-badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; background: rgba(167,139,250,0.2); color: var(--purple); font-family: var(--mono); font-weight: 500; }
.activity-meta { font-size: 11px; color: var(--muted); }
.activity-participants { font-size: 13px; color: var(--accent2); margin-bottom: 4px; }
.activity-summary { font-size: 13px; color: var(--text); line-height: 1.6; }
.activity-contacts-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.activity-contact-tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; background: rgba(59,130,246,0.1); color: var(--accent2); font-family: var(--mono); }
.activity-empty { text-align: center; padding: 48px 16px; color: var(--muted); }
.activity-empty h3 { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
.activity-empty p { font-size: 13px; }

/* Strategy Tab */
.strategy-card {
  background: var(--surface);
  border: 1px solid var(--border);

  padding: 20px;
  margin-bottom: 20px;
}
.strategy-card-header {
  display: flex;

  justify-content: space-between;
  margin-bottom: 12px;
}
.strategy-card-header h3 {
  font-size: 15px;

  color: var(--text);

}
.strategy-badges {
  display: flex;
  gap: 6px;
  align-items: center;
}
.strategy-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

  background: rgba(59,130,246,0.1);

}

}

}

}

  text-align: center;

  color: var(--muted);

}
.strategy-empty {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 13px;
}

/* Briefing tab */
.briefing-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.briefing-meta { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 12px; letter-spacing: 0.04em; }
.briefing-content { font-size: 13px; line-height: 1.7; color: var(--text); }
.briefing-section-header { font-size: 15px; font-weight: 500; color: var(--text); margin-top: 16px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); }

.briefing-actions button { border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--font); font-size: 13px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }

.briefing-actions button.primary { background: #3B82F6; border-color: #3B82F6; color: white; }
.briefing-actions button.primary:hover { background: #2563EB; }

.intel-form {

}
.intel-note-header {

}
.intel-label {
  font-size: 10px;
  font-weight: 500;

  border-radius: 4px;
  background: rgba(239,68,68,0.1);

}
.intel-date {
  font-size: 11px;

}
.intel-text {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
}
.intel-section-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
  margin-top: 20px;
}

/* Buying Triggers */
.triggers-title {
  font-size: 13px;

  color: var(--muted);
  text-transform: uppercase;

  justify-content: space-between;
}

}

.trigger-badge.cat-cost-cuts { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; }

.trigger-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: none;
}
.trigger-form.show { display: block; }
.trigger-form-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.trigger-form select,
.trigger-form input {
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}
.trigger-form select { min-width: 160px; }
.trigger-form input { flex: 1; }
.trigger-form textarea {

/* Activity timeline trigger entry */

}

@media (max-width: 900px) {
  .sidebar { display: none; }
  .g2,.g3,.g4 { grid-template-columns: 1fr; }
  .acct-header { padding: 20px 16px; }
  .acct-content { padding: 16px; }
  .contact-grid { grid-template-columns: 1fr; }
  .contact-fields { grid-template-columns: 1fr; }
}

@media print {
  /* Hide all app chrome */
  .topnav,
  .sidebar,
  .acct-header,
  .acct-tabs,
  .briefing-actions,
  .stale-badge,
  .acct-actions { display: none !important; }

  /* Reset dark theme to white page */
  body, html { background: #fff !important; color: #000 !important; }
  .main-content { margin: 0 !important; padding: 0 !important; background: #fff !important; }
  .acct-content { border: none !important; background: #fff !important; padding: 0 !important; }

  /* Hide all tab panes except the active one (the briefing) */
  .tab-pane { display: none !important; }
  .tab-pane.active { display: block !important; }

  /* Account panel: remove dark styling */
  .account-panel { background: #fff !important; border: none !important; }

  /* Briefing card: clean print appearance */

  /* Page settings */

}
</style>

<script>
let accounts = [];
let chatHistories = {};
let currentAccount = null;
let editingAccountId = null;
let removingAccountId = null;

// ---- XSS Protection (T-02-01, T-02-02) ----
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ---- Data Loading ----
async function loadAccounts() {
  try {
    const res = await fetch('/api/accounts');
    accounts = await res.json();
  } catch (e) {
    accounts = [];
  }
  renderSidebar();
  if (accounts.length > 0) {
    showAccount(accounts[0].id);
  } else {
    renderEmptyState();
  }
  document.getElementById('acctCount').textContent = accounts.length + ' account' + (accounts.length !== 1 ? 's' : '');
}

// ---- Section collapse state ----
var sectionState = {};

// ---- Sidebar Rendering ----
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  var groups = {};
  accounts.forEach(function(a) {
    if (!groups[a.sector]) groups[a.sector] = [];
    groups[a.sector].push(a);
  });
  var html = '<div class="sidebar-items">';
  var sectors = Object.keys(groups);
  for (var i = 0; i < sectors.length; i++) {
    var sector = sectors[i];
    var items = groups[sector];
    var isCollapsed = sectionState[sector] === true;
    html += '<div class="sidebar-section' + (isCollapsed ? ' collapsed' : '') + '" onclick="toggleSection(' + i + ')" id="sec-' + i + '">';
    html += '<span>' + escapeHtml(sector) + '</span>';
    html += '<span class="sidebar-section-chevron">&#9660;</span>';
    html += '</div>';
    html += '<div class="sidebar-group' + (isCollapsed ? ' collapsed' : '') + '" id="group-' + i + '">';
    for (var j = 0; j < items.length; j++) {
      var a = items[j];
      var shortName = getShortName(a.name);
      html += '<button class="sidebar-item" onclick="showAccount(\'' + escapeHtml(a.id) + '\')" id="sb-' + escapeHtml(a.id) + '">';
      html += '<span class="sidebar-dot" style="background:' + escapeHtml(a.dot_color || '#3B82F6') + '"></span>';
      html += escapeHtml(shortName);
      html += '<span class="sidebar-revenue">' + escapeHtml(a.display_revenue || '') + '</span>';
      html += '</button>';
    }
    html += '</div>';
  }
  html += '</div>';
  html += '<button class="sidebar-add" onclick="openAddModal()">+ Add Account</button>';
  sidebar.innerHTML = html;
}

// ---- Toggle Section ----
function toggleSection(index) {
  var secEl = document.getElementById('sec-' + index);
  var groupEl = document.getElementById('group-' + index);
  if (!secEl || !groupEl) return;
  var isCollapsed = groupEl.classList.contains('collapsed');
  // Derive sector name from the span inside the header
  var sectorSpan = secEl.querySelector('span');
  var sector = sectorSpan ? sectorSpan.textContent : '';
  if (isCollapsed) {
    groupEl.classList.remove('collapsed');
    secEl.classList.remove('collapsed');
    sectionState[sector] = false;
  } else {
    groupEl.classList.add('collapsed');
    secEl.classList.add('collapsed');
    sectionState[sector] = true;
  }
}

function getShortName(name) {
  if (!name) return '';
  // Remove common corporate suffixes for a cleaner sidebar label
  return name
    .replace(/\s+(Company|GmbH|International|SE|Group AG|Inc\.?|Corp\.?|LLC|Ltd\.?|Automotive|Holdings?)$/i, '')
    .replace(/\s*\(.*?\)\s*$/, '')
    .trim();
}

// ---- Account Panel Rendering ----
function renderAccountPanel(account) {
  var a = account;
  var id = escapeHtml(a.id);
  var name = escapeHtml(a.name);
  var sector = escapeHtml(a.sector || '');
  var hq = escapeHtml(a.hq || '');
  var revenue = escapeHtml(a.revenue || '');
  var employees = escapeHtml(a.employees || '');
  var context = escapeHtml(a.context || '');

  var html = '<div class="account-panel" id="panel-' + id + '">';
  html += '<div class="acct-header">';
  html += '<div class="acct-tag">Account Intelligence &middot; ' + sector + '</div>';
  html += '<div style="display:flex;align-items:flex-start;gap:16px">';
  html += '<div class="acct-name"><strong>' + name + '</strong></div>';
  html += '<div class="acct-actions">';
  html += '<span class="stale-badge ' + getRefreshStalenessClass(a.last_refreshed_at) + '" id="refresh-badge-' + id + '">' + getRefreshStalenessLabel(a.last_refreshed_at) + '</span>';
  html += '<button class="refresh-btn" id="refresh-btn-' + id + '" onclick="manualRefresh(\'' + id + '\')">Refresh Intelligence</button>';
  html += '<button class="acct-action-btn" onclick="openEditModal(\'' + id + '\')">Edit Account</button>';
  html += '<button class="acct-action-btn del" onclick="openRemoveModal(\'' + id + '\')">Remove Account</button>';
  html += '</div>';
  html += '</div>';
  html += '<div class="acct-sub">' + hq + '</div>';
  html += '<div class="acct-kpis">';
  html += '<div><div class="kpi-val">' + revenue + '</div><div class="kpi-label">Revenue</div></div>';
  html += '<div><div class="kpi-val">' + employees + '</div><div class="kpi-label">Employees</div></div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="acct-tabs">';
  html += '<button class="acct-tab active" onclick="showTab(\'' + id + '\',\'overview\',this)">Overview</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'contacts\',this)">Contacts</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'activity\',this)">Activity</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'strategy\',this)">Strategy</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'briefing\',this)">Briefing</button>';
  html += '<button class="acct-tab" onclick="showTab(\'' + id + '\',\'ai\',this)">Ask AI</button>';
  html += '</div>';

  html += '<div class="acct-content">';
  // Overview tab
  html += '<div class="tab-pane active" id="' + id + '-overview">';
  // SECURITY: escapeHtml MUST run before any .replace() that injects HTML tags.
  html += '<div class="hl"><div class="hl-label">Account Intelligence</div>' + escapeHtml(context).replace(/\n/g, '<br>') + '</div>';
  html += '</div>';
  // Contacts tab
  html += '<div class="tab-pane" id="' + id + '-contacts"><div id="' + id + '-contacts-panel"></div></div>';
  // Activity tab
  html += '<div class="tab-pane" id="' + id + '-activity">';
  html += '<div id="' + id + '-activity-panel"></div>';
  html += '</div>';
  // Strategy tab
  html += '<div class="tab-pane" id="' + id + '-strategy"><div id="' + id + '-strategy-panel"></div></div>';
  // Briefing tab
  html += '<div class="tab-pane" id="' + id + '-briefing"><div id="' + id + '-briefing-panel"></div></div>';
  // AI tab
  html += '<div class="tab-pane" id="' + id + '-ai"><div id="' + id + '-ai-panel"></div></div>';
  html += '</div>';

  html += '</div>';

  var mainContent = document.getElementById('mainContent');
  var temp = document.createElement('div');
  temp.innerHTML = html;
  mainContent.appendChild(temp.firstChild);
}

// ---- Show Account ----
function showAccount(id) {
  document.querySelectorAll('.account-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.sidebar-item').forEach(function(b) { b.classList.remove('active'); });

  // Render panel if it doesn't exist yet
  if (!document.getElementById('panel-' + id)) {
    var acct = accounts.find(function(a) { return a.id === id; });
    if (acct) renderAccountPanel(acct);
  }

  var panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');

  var sbItem = document.getElementById('sb-' + id);
  if (sbItem) {
    sbItem.classList.add('active');
    // Expand parent section if it is collapsed
    var parentGroup = sbItem.closest('.sidebar-group');
    if (parentGroup && parentGroup.classList.contains('collapsed')) {
      var groupId = parentGroup.id; // e.g. "group-2"
      var idx = groupId.replace('group-', '');
      var secEl = document.getElementById('sec-' + idx);
      parentGroup.classList.remove('collapsed');
      if (secEl) {
        secEl.classList.remove('collapsed');
        var sectorSpan = secEl.querySelector('span');
        var sector = sectorSpan ? sectorSpan.textContent : '';
        sectionState[sector] = false;
      }
    }
  }

  currentAccount = id;

  // Init AI panel if needed
  if (!chatHistories[id]) {
    chatHistories[id] = [];
    initAIPanel(id);
  }
}

// ---- Show Tab ----
function showTab(account, tab, btn) {
  var panel = document.getElementById('panel-' + account);
  if (!panel) return;
  panel.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
  panel.querySelectorAll('.acct-tab').forEach(function(b) { b.classList.remove('active'); });
  var pane = document.getElementById(account + '-' + tab);
  if (pane) pane.classList.add('active');
  if (btn) btn.classList.add('active');
  if (tab === 'ai' && !chatHistories[account]) {
    chatHistories[account] = [];
    initAIPanel(account);
  }
  if (tab === 'contacts') {
    var contactsPanel = document.getElementById(account + '-contacts-panel');
    if (contactsPanel && !contactsPanel.dataset.loaded) {
      contactsPanel.dataset.loaded = '1';
      loadContacts(account);
    }
  }
  if (tab === 'activity') {
    var activityPanel = document.getElementById(account + '-activity-panel');
    if (activityPanel && !activityPanel.dataset.loaded) {
      activityPanel.dataset.loaded = '1';
      loadActivity(account);
    }
  }
  if (tab === 'strategy') {
    var strategyPanel = document.getElementById(account + '-strategy-panel');
    if (strategyPanel && !strategyPanel.dataset.loaded) {
      strategyPanel.dataset.loaded = '1';
      loadStrategyTab(account);
    }
  }
  if (tab === 'briefing') {
    var briefingPanel = document.getElementById(account + '-briefing-panel');
    if (briefingPanel && !briefingPanel.dataset.loaded) {
      briefingPanel.dataset.loaded = '1';
      loadBriefingTab(account);
    }
  }
}

// ---- AI Panel ----
function initAIPanel(id) {
  var container = document.getElementById(id + '-ai-panel');
  if (!container || container.innerHTML !== '') return;
  var acct = accounts.find(function(a) { return a.id === id; });
  if (!acct) return;
  var safeName = escapeHtml(acct.name);
  var safeId = escapeHtml(id);
  container.innerHTML =
    '<div class="ai-panel">' +
      '<div class="ai-hdr"><div class="ai-dot"></div><div class="ai-hdr-txt">Account AI &mdash; ' + safeName + '</div><div class="ai-hdr-sub">Claude &middot; GD context loaded</div></div>' +
      '<div class="ai-msgs" id="msgs-' + safeId + '">' +
        '<div class="msg ai"><div class="msg-av ai">AI</div><div class="msg-bub">Ask anything about ' + safeName + '.</div></div>' +
      '</div>' +
      '<div class="ai-chips" id="chips-' + safeId + '">' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">Where does GD start here?</button>' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">Who should we contact first?</button>' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">What is the best differentiator vs large SIs?</button>' +
        '<button class="chip" onclick="sendChip(\'' + safeId + '\',this)">Draft an opening outreach email</button>' +
      '</div>' +
      '<div class="ai-inp-area">' +
        '<input class="ai-inp" id="inp-' + safeId + '" type="text" placeholder="Ask about ' + safeName + '..." onkeydown="if(event.key===\'Enter\') sendMsg(\'' + safeId + '\')" />' +
        '<button class="ai-send" onclick="sendMsg(\'' + safeId + '\')" aria-label="Send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>' +
      '</div>' +
    '</div>';
  loadChatHistory(id);
}

async function loadChatHistory(id) {
  try {
    var res = await fetch('/api/accounts/' + id + '/chat');
    var messages = await res.json();
    if (messages.length === 0) return;
    // Populate in-memory chatHistories from DB
    chatHistories[id] = messages.map(function(m) { return { role: m.role, content: m.content }; });
    // Clear the default welcome message and render saved messages
    var msgsContainer = document.getElementById('msgs-' + id);
    if (!msgsContainer) return;
    msgsContainer.innerHTML = '';
    messages.forEach(function(m) {
      addMsg(id, m.role === 'user' ? 'user' : 'ai', m.content);
    });
    // Hide chips if there is existing history
    var chips = document.getElementById('chips-' + id);
    if (chips) chips.style.display = 'none';
  } catch (e) {
    console.error('Failed to load chat history:', e);
  }
}

function saveChatMessage(accountId, role, content) {
  fetch('/api/accounts/' + accountId + '/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: role, content: content })
  }).catch(function(e) { console.error('Failed to save chat message:', e); });
}

function sendChip(id, btn) {
  document.getElementById('inp-' + id).value = btn.textContent;
  sendMsg(id);
}

async function sendMsg(id) {
  var inp = document.getElementById('inp-' + id);
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  var chipsEl = document.getElementById('chips-' + id);
  if (chipsEl) chipsEl.style.display = 'none';
  addMsg(id, 'user', text);
  if (!chatHistories[id]) chatHistories[id] = [];
  chatHistories[id].push({ role: 'user', content: text });
  saveChatMessage(id, 'user', text);
  var typingId = addTyping(id);

  try {
    var messages = chatHistories[id].map(function(m) { return { role: m.role, content: m.content }; });
    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: messages,
        account_id: id
      })
    });
    if (!res.ok) {
      var errData = {};
      try { errData = await res.json(); } catch(e) {}
      var errMsg = errData.error || 'Something went wrong. Please try again.';
      removeTyping(id, typingId);
      addMsg(id, 'ai', errMsg);
      return;
    }
    var data = await res.json();
    removeTyping(id, typingId);
    var reply = data.content && data.content[0] ? data.content[0].text : 'Unable to get a response. Please try again.';
    chatHistories[id].push({ role: 'assistant', content: reply });
    saveChatMessage(id, 'assistant', reply);
    addMsg(id, 'ai', reply);
  } catch(e) {
    removeTyping(id, typingId);
    addMsg(id, 'ai', 'There was an error. Please try again.');
  }
}

function addMsg(id, role, text) {
  var msgs = document.getElementById('msgs-' + id);
  if (!msgs) return;
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  var av = role === 'ai' ? 'AI' : 'DZ';
  // SECURITY: escapeHtml MUST run before any .replace() that injects HTML tags.
  // The captured groups contain already-escaped text, so this is safe.
  var fmt = escapeHtml(text).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  div.innerHTML = '<div class="msg-av ' + role + '">' + av + '</div><div class="msg-bub">' + fmt + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping(id) {
  var msgs = document.getElementById('msgs-' + id);
  var tid = 'typing-' + id + '-' + Date.now();
  var div = document.createElement('div');
  div.className = 'msg ai';
  div.id = tid;
  div.innerHTML = '<div class="msg-av ai">AI</div><div class="msg-bub"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return tid;
}

function removeTyping(id, tid) {
  var el = document.getElementById(tid);
  if (el) el.remove();
}

// ---- Search / Filter ----
function filterAccounts(query) {
  var q = query.toLowerCase();
  var items = document.querySelectorAll('.sidebar-item');
  var visible = 0;
  var isSearching = q.length > 0;

  items.forEach(function(item) {
    var matches = item.textContent.toLowerCase().includes(q);
    item.style.display = matches ? '' : 'none';
    if (matches) visible++;
  });

  // Show all groups when searching so matching items are visible regardless of collapse state
  // Restore saved collapse state when search is cleared
  var groups = document.querySelectorAll('.sidebar-group');
  var secs = document.querySelectorAll('.sidebar-section');
  if (isSearching) {
    groups.forEach(function(g) { g.classList.remove('collapsed'); });
    secs.forEach(function(s) { s.classList.remove('collapsed'); });
  } else {
    groups.forEach(function(g, i) {
      var secEl = document.getElementById('sec-' + i);
      var sectorSpan = secEl ? secEl.querySelector('span') : null;
      var sector = sectorSpan ? sectorSpan.textContent : '';
      if (sectionState[sector] === true) {
        g.classList.add('collapsed');
        if (secEl) secEl.classList.add('collapsed');
      } else {
        g.classList.remove('collapsed');
        if (secEl) secEl.classList.remove('collapsed');
      }
    });
  }

  document.getElementById('acctCount').textContent = visible + ' account' + (visible !== 1 ? 's' : '');
}

// ---- Modal: Save Account ----
async function saveAccount() {
  var name = document.getElementById('modalName').value.trim();
  if (!name) {
    showModalError('Company name is required.');
    return;
  }

  var btn = document.getElementById('modalSaveBtn');
  var originalText = btn.textContent;
  btn.textContent = 'Saving...';
  btn.disabled = true;
  hideModalError();

  var payload = {
    name: name,
    sector: document.getElementById('modalSector').value.trim(),
    revenue: document.getElementById('modalRevenue').value.trim(),
    employees: document.getElementById('modalEmployees').value.trim(),
    hq: document.getElementById('modalHQ').value.trim(),
    context: document.getElementById('modalContext').value.trim()
  };

  try {
    var url, method;
    if (editingAccountId) {
      url = '/api/accounts/' + editingAccountId;
      method = 'PUT';
    } else {
      url = '/api/accounts';
      method = 'POST';
    }

    var res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      throw new Error('Server error');
    }

    var saved = await res.json();
    closeModal();

    // Clear rendered panels so they re-render with fresh data
    document.getElementById('mainContent').innerHTML = '';

    await loadAccounts();

    // Select the saved account
    showAccount(saved.id);
  } catch (e) {
    showModalError("Couldn't save. Check your connection and try again.");
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

// ---- Contact Staleness Helpers (D-12) ----
function getStalenessClass(researchedAt) {
  if (!researchedAt) return 'stale-stale';
  var now = new Date();
  var researched = new Date(researchedAt);
  var days = Math.floor((now - researched) / (1000 * 60 * 60 * 24));
  if (days < 30) return 'stale-fresh';
  if (days < 90) return 'stale-aging';
  return 'stale-stale';
}

function getStalenessLabel(researchedAt) {
  if (!researchedAt) return 'STALE';
  var now = new Date();
  var researched = new Date(researchedAt);
  var days = Math.floor((now - researched) / (1000 * 60 * 60 * 24));
  if (days < 30) return 'FRESH';
  if (days < 90) return 'AGING';
  return 'STALE';
}

// ---- Intelligence Refresh Staleness Helpers ----
function getRefreshStalenessClass(lastRefreshedAt) {
  if (!lastRefreshedAt) return 'stale-stale';
  var now = new Date();
  var refreshed = new Date(lastRefreshedAt);
  var days = Math.floor((now - refreshed) / (1000 * 60 * 60 * 24));
  if (days < 7) return 'stale-fresh';
  if (days < 30) return 'stale-aging';
  return 'stale-stale';
}

function getRefreshStalenessLabel(lastRefreshedAt) {
  if (!lastRefreshedAt) return 'Never refreshed';
  var now = new Date();
  var refreshed = new Date(lastRefreshedAt);
  var days = Math.floor((now - refreshed) / (1000 * 60 * 60 * 24));
  if (days === 0) return 'Refreshed today';
  if (days === 1) return 'Refreshed 1 day ago';
  return 'Refreshed ' + days + ' days ago';
}

// ---- Manual Refresh ----
async function manualRefresh(accountId) {
  var btn = document.getElementById('refresh-btn-' + accountId);
  var badge = document.getElementById('refresh-badge-' + accountId);
  if (!btn) return;

  // Loading state (D-18)
  btn.disabled = true;
  btn.textContent = 'Refreshing...';

  try {
    var resp = await fetch('/api/accounts/' + accountId + '/refresh', { method: 'POST' });
    var data = await resp.json();

    if (!resp.ok) {
      var errMsg = data.error || 'Something went wrong. Please try again.';
      showRefreshToast('Refresh Error', errMsg);
      return;
    }

    // Update badge (D-18)
    if (badge) {
      badge.className = 'stale-badge ' + getRefreshStalenessClass(data.account.last_refreshed_at);
      badge.textContent = getRefreshStalenessLabel(data.account.last_refreshed_at);
    }

    // Update account data in local array (D-20)
    var idx = accounts.findIndex(function(a) { return a.id === accountId; });
    if (idx !== -1) {
      accounts[idx] = data.account;
    }

    // Re-render overview tab with updated context (D-20)
    var overviewPane = document.getElementById(accountId + '-overview');
    if (overviewPane) {
      overviewPane.innerHTML = '<div class="hl"><div class="hl-label">Account Intelligence</div>' + escapeHtml(data.account.context || '').replace(/\n/g, '<br>') + '</div>';
    }

    // Update KPI values if changed (D-22)
    var panel = document.getElementById('panel-' + accountId);
    if (panel) {
      var kpiVals = panel.querySelectorAll('.kpi-val');
      if (kpiVals.length >= 2) {
        kpiVals[0].textContent = data.account.revenue || '';
        kpiVals[1].textContent = data.account.employees || '';
      }
    }

    // Show changes summary toast
    showRefreshToast(data.account.name, data.changes_summary);

    // Refresh budget indicator
    loadBudgetStatus();

  } catch (e) {
    showRefreshToast('Refresh Error', e.message || 'There was an error refreshing this account.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Refresh Intelligence';
  }
}

function showRefreshToast(title, message) {
  // Remove existing toast if any
  var existing = document.querySelector('.refresh-toast');
  if (existing) existing.remove();

  var toast = document.createElement('div');
  toast.className = 'refresh-toast';
  toast.innerHTML = '<div class="refresh-toast-title">' + escapeHtml(title) + '</div><div class="refresh-toast-body">' + escapeHtml(message) + '</div>';
  document.body.appendChild(toast);

  // Auto-dismiss after 8 seconds
  setTimeout(function() {
    if (toast.parentNode) toast.remove();
  }, 8000);

  // Click to dismiss
  toast.addEventListener('click', function() { toast.remove(); });
}

// ---- Budget Status Indicator ----
async function loadBudgetStatus() {
  try {
    var resp = await fetch('/api/refresh/budget');
    if (!resp.ok) return;
    var data = await resp.json();

    var indicator = document.getElementById('budgetIndicator');
    var text = document.getElementById('budgetText');
    var fill = document.getElementById('budgetFill');
    if (!indicator || !text || !fill) return;

    // Only show when usage exceeds 50%
    if (data.pct < 50) {
      indicator.style.display = 'none';
      return;
    }

    indicator.style.display = 'inline-flex';
    text.textContent = data.pct + '% budget';
    fill.style.width = Math.min(data.pct, 100) + '%';
    fill.className = 'budget-fill ' + (data.pct < 70 ? 'ok' : data.pct < 90 ? 'warn' : 'danger');
  } catch (e) {
    // Silently fail -- budget indicator is informational only
  }
}

  html += '<span class="contacts-count">' + contacts.length + (contacts.length === 1 ? ' contact' : ' contacts') + '</span>';
  html += '<button class="btn btn-primary" onclick="openAddContactModal(\'' + escapeHtml(accountId) + '\')">Add Contact</button>';
  html += '</div>';

  if (contacts.length === 0) {
    html += '<div class="contacts-empty">';

    html += '<button class="btn btn-primary" onclick="openAddContactModal(\'' + escapeHtml(accountId) + '\')">Add Contact</button>';
    html += '</div>';
    panel.innerHTML = html;
    return;
  }

  var groups = { Champion: [], Evaluator: [], Blocker: [] };
  contacts.forEach(function(c) {
    if (groups[c.influence]) groups[c.influence].push(c);
  });

  var groupLabels = { Champion: 'Champions', Evaluator: 'Evaluators', Blocker: 'Blockers' };
  var groupOrder = ['Champion', 'Evaluator', 'Blocker'];

  groupOrder.forEach(function(influence) {

    html += '<div class="contact-group">';
    html += '<div class="contact-group-hdr">' + groupLabels[influence] + '</div>';
    html += '<div class="contact-grid">';
    groups[influence].forEach(function(contact) {
      html += renderContactCard(contact);
    });
    html += '</div>';
    html += '</div>';
  });

  panel.innerHTML = html;
}

// ---- Contact Detail Toggle (D-03) ----
var expandedContactId = null;

function toggleContactDetail(contactId, accountId) {
  // Collapse currently expanded card
  if (expandedContactId && expandedContactId !== contactId) {
    var prevDetail = document.getElementById('contact-detail-' + expandedContactId);
    var prevCard = document.getElementById('contact-card-' + expandedContactId);
    if (prevDetail) prevDetail.classList.remove('show');
    if (prevCard) prevCard.classList.remove('expanded');
  }

  var detail = document.getElementById('contact-detail-' + contactId);
  var card = document.getElementById('contact-card-' + contactId);
  if (!detail || !card) return;

  if (detail.classList.contains('show')) {
    detail.classList.remove('show');
    card.classList.remove('expanded');
    expandedContactId = null;
  } else {
    // Load detail content if empty
    if (!detail.innerHTML) {
      loadContactDetail(contactId, accountId);
    }
    detail.classList.add('show');
    card.classList.add('expanded');
    expandedContactId = contactId;
  }
}

function generateAI(contactId, accountId) {
  var rationaleBody = document.getElementById('rationale-body-' + contactId);
  var warmpathBody = document.getElementById('warmpath-body-' + contactId);

  // Show generating state on both sections
  if (rationaleBody) {
    rationaleBody.innerHTML = '<button class="contact-generate-btn" disabled>Generating...</button>';
  }
  if (warmpathBody) {
    warmpathBody.innerHTML = '<button class="contact-generate-btn" disabled>Generating...</button>';
  }

  fetch('/api/contacts/' + contactId + '/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({})
  })
    .then(function(r) {
      if (!r.ok) {
        return r.json().catch(function() { return {}; }).then(function(errData) {
          var errMsg = errData.error || 'Something went wrong. Please try again.';
          if (rationaleBody) {
            rationaleBody.innerHTML = '<p style="color:var(--red);font-size:11px;margin-bottom:8px">' + escapeHtml(errMsg) + '</p>' +
              '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Generate Rationale</button>';
          }
          if (warmpathBody) {
            warmpathBody.innerHTML = '<p style="color:var(--red);font-size:11px;margin-bottom:8px">' + escapeHtml(errMsg) + '</p>' +
              '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Find Warm Path</button>';
          }
          throw new Error('handled');
        });
      }
      return r.json();
    })
    .then(function(contact) {
      // Update rationale section
      if (rationaleBody) {
        var rHtml = '';
        if (contact.ai_rationale) {
          rHtml += '<div class="ai-content-block">' + escapeHtml(contact.ai_rationale).replace(/\n/g, '<br>') + '</div>';
          rHtml += '<div style="margin-top:8px"><a href="javascript:void(0)" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')" style="font-size:11px;color:var(--muted)">Refresh Rationale</a></div>';
        } else {
          rHtml += '<p style="color:var(--muted);font-size:13px;margin-bottom:8px">No outreach rationale generated yet.</p>';
          rHtml += '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Generate Rationale</button>';
        }
        rationaleBody.innerHTML = rHtml;
      }

      // Update warm path section
      if (warmpathBody) {
        var wHtml = '';
        if (contact.warm_path) {
          wHtml += '<div class="ai-content-block">' + escapeHtml(contact.warm_path).replace(/\n/g, '<br>') + '</div>';
          wHtml += '<div style="margin-top:8px"><a href="javascript:void(0)" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')" style="font-size:11px;color:var(--muted)">Refresh Warm Path</a></div>';
        } else {
          wHtml += '<p style="color:var(--muted);font-size:13px;margin-bottom:8px">No warm path identified yet.</p>';
          wHtml += '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Find Warm Path</button>';
        }
        warmpathBody.innerHTML = wHtml;
      }

      // Update staleness badge on the card (researched_at just updated)
      var card = document.getElementById('contact-card-' + contactId);
      if (card && contact.researched_at) {
        var staleBadge = card.querySelector('.stale-badge');
        if (staleBadge) {
          staleBadge.className = 'stale-badge ' + getStalenessClass(contact.researched_at);
          staleBadge.textContent = getStalenessLabel(contact.researched_at);
        }
      }
    })
    .catch(function(err) {
      if (err && err.message === 'handled') return;
      if (rationaleBody) {
        rationaleBody.innerHTML = '<p style="color:var(--red);font-size:11px;margin-bottom:8px">Couldn\'t generate. Try again in a moment.</p>' +
          '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Generate Rationale</button>';
      }
      if (warmpathBody) {
        warmpathBody.innerHTML = '<p style="color:var(--red);font-size:11px;margin-bottom:8px">Couldn\'t generate. Try again in a moment.</p>' +
          '<button class="contact-generate-btn" onclick="event.stopPropagation();generateAI(' + contactId + ',\'' + escapeHtml(accountId) + '\')">Find Warm Path</button>';
      }
    });
}

function submitOutreach(contactId) {

  fetch('/api/contacts/' + contactId + '/outreach', {

  })
    .then(function(r) {

      return r.json();

function loadStrategy(accountId) {
  var cardEl = document.getElementById(accountId + '-strategy-card');
  if (!cardEl) return;

  fetch('/api/accounts/' + encodeURIComponent(accountId) + '/strategy')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.content) {
        strategyCache[accountId] = data;
        renderStrategy(accountId, data);
      } else {
        // Auto-generate if no strategy exists (D-10)
        // Guard against race condition (RESEARCH.md pitfall 4)
        if (cardEl.dataset.generating) return;
        cardEl.dataset.generating = '1';
        cardEl.innerHTML = '<div class="strategy-loading">Generating strategy...</div>';
        generateStrategy(accountId);
      }
    })
    .catch(function() {
      if (cardEl) cardEl.innerHTML = '<div class="strategy-empty">Failed to load strategy. Reload and try again.</div>';
    });
}

function renderStrategy(accountId, strategy) {
  var cardEl = document.getElementById(accountId + '-strategy-card');
  if (!cardEl) return;
  strategyCache[accountId] = strategy;
  var safeId = escapeHtml(accountId);

  var html = '<div class="strategy-card">';
  html += '<div class="strategy-card-header">';
  html += '<h3>Strategy Summary</h3>';
  html += '<div class="strategy-badges">';
  html += '<span class="strategy-badge ai">AI-Generated</span>';
  if (strategy.is_edited === 1) {
    html += '<span class="strategy-badge edited">Edited</span>';
  }
  html += '</div>';
  html += '</div>';

  // Date info
  var dateInfo = '';
  if (strategy.generated_at) {
    dateInfo += 'Generated ' + formatActivityDate(strategy.generated_at);
  }
  if (strategy.edited_at) {
    dateInfo += ' &middot; Edited ' + formatActivityDate(strategy.edited_at);
  }
  if (dateInfo) {
    html += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px">' + dateInfo + '</div>';
  }

  // Content
  html += '<div class="strategy-content" id="' + safeId + '-strategy-text">' + escapeHtml(strategy.content).replace(/\n/g, '<br>') + '</div>';

  // Action buttons
  html += '<div class="strategy-actions" id="' + safeId + '-strategy-actions">';
  html += '<button onclick="editStrategy(\'' + safeId + '\')">Edit</button>';
  html += '<button onclick="regenerateStrategy(\'' + safeId + '\')">Regenerate Strategy</button>';

  html += '</div>';
  cardEl.innerHTML = html;

function generateStrategy(accountId) {
  var cardEl = document.getElementById(accountId + '-strategy-card');
  if (cardEl && !cardEl.querySelector('.strategy-loading')) {
    cardEl.innerHTML = '<div class="strategy-loading">Generating strategy...</div>';
  }

  fetch('/api/accounts/' + encodeURIComponent(accountId) + '/strategy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }
  })
    .then(function(r) {
      if (!r.ok) {
        return r.json().catch(function() { return {}; }).then(function(errData) {
          var errMsg = errData.error || 'Something went wrong. Please try again.';
          if (cardEl) {
            delete cardEl.dataset.generating;
            cardEl.innerHTML = '<div class="strategy-empty">' + escapeHtml(errMsg) + ' <button style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:var(--font);font-size:13px;text-decoration:underline" onclick="generateStrategy(\'' + escapeHtml(accountId) + '\')">Try again</button></div>';
          }
          throw new Error('handled');
        });
      }
      return r.json();
    })
    .then(function(data) {
      if (cardEl) delete cardEl.dataset.generating;
      strategyCache[accountId] = data;
      renderStrategy(accountId, data);
    })
    .catch(function(err) {
      if (err && err.message === 'handled') return;
      if (cardEl) {
        delete cardEl.dataset.generating;
        cardEl.innerHTML = '<div class="strategy-empty">Failed to generate strategy. <button style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:var(--font);font-size:13px;text-decoration:underline" onclick="generateStrategy(\'' + escapeHtml(accountId) + '\')">Try again</button></div>';

    });

function briefingTextToHtml(text) {
  return text.split('\n').map(function(line) {
    var trimmed = line.trim();
    if (!trimmed) return '';
    // Section headers
    if (trimmed.indexOf('## ') === 0) {
      return '<h3 class="briefing-section-header">' + escapeHtml(trimmed.substring(3)) + '</h3>';
    }
    // Bullet points
    if (trimmed.match(/^[-*]\s+/)) {
      return '<li>' + escapeHtml(trimmed.replace(/^[-*]\s+/, '')) + '</li>';
    }
    // Numbered list items
    if (trimmed.match(/^\d+\.\s+/)) {
      return '<li>' + escapeHtml(trimmed.replace(/^\d+\.\s+/, '')) + '</li>';
    }
    return escapeHtml(trimmed);
  }).join('<br>');
}

function renderBriefing(accountId, briefing) {
  var cardEl = document.getElementById(accountId + '-briefing-card');
  var actionsEl = document.getElementById(accountId + '-briefing-actions');
  if (!cardEl) return;
  var dateStr = briefing.generated_at ? 'Generated ' + formatActivityDate(briefing.generated_at) : '';
  var contentHtml = briefingTextToHtml(briefing.content);

function formatActivityDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr.replace(' ', 'T') + (dateStr.indexOf('Z') === -1 && dateStr.indexOf('+') === -1 ? 'Z' : ''));
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var hours = d.getHours();
  var ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  if (hours === 0) hours = 12;
  var mins = d.getMinutes();
  var minStr = mins < 10 ? '0' + mins : '' + mins;
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + ' ' + hours + ':' + minStr + ' ' + ampm;
}

var TRIGGER_COLORS = {
  'CTO Change': '#3B82F6',
  'Cost Cuts': '#EF4444',
  'Failed Vendor': '#F59E0B',
  'Reorg': '#A78BFA',
  'M&A': '#14B8A6',

function loadActivity(accountId) {
  var panel = document.getElementById(accountId + '-activity-panel');
  if (!panel) return;
  panel.innerHTML = '<p style="color:var(--muted);font-size:13px">Loading activity...</p>';

  var activityUrl = '/api/accounts/' + encodeURIComponent(accountId) + '/activity';
  var triggersUrl = '/api/accounts/' + encodeURIComponent(accountId) + '/triggers';

  // Fetch both activities and triggers in parallel
  Promise.all([
    fetch(activityUrl).then(function(r) { return r.json(); }),
    fetch(triggersUrl).then(function(r) { return r.json(); }).catch(function() { return []; })
  ])
    .then(function(results) {
      var entries = results[0] || [];
      var triggers = results[1] || [];

      // Mark triggers with _isTrigger flag and normalize for merge
      var combined = [];
      for (var a = 0; a < entries.length; a++) {
        entries[a]._isTrigger = false;
        combined.push(entries[a]);
      }
      for (var t = 0; t < triggers.length; t++) {
        triggers[t]._isTrigger = true;
        combined.push(triggers[t]);
      }

      // Sort combined by created_at descending
      combined.sort(function(a, b) {
        var da = a.created_at || '';
        var db = b.created_at || '';
        return da < db ? 1 : da > db ? -1 : 0;
      });

      var safeId = escapeHtml(accountId);
      var html = '';

      // Manual entry form
      html += '<div class="activity-form" id="' + safeId + '-activity-form">';
      html += '<div style="font-size:14px;font-weight:500;margin-bottom:2px">Log Activity</div>';
      html += '<div class="activity-form-row">';
      html += '<select id="' + safeId + '-activity-type">';
      html += '<option value="meeting">Meeting</option>';
      html += '<option value="call">Call</option>';
      html += '<option value="email">Email</option>';
      html += '<option value="note">Note</option>';
      html += '<option value="other">Other</option>';
      html += '</select>';
      html += '<input type="text" id="' + safeId + '-activity-participants" placeholder="Who was involved?" />';
      html += '</div>';
      html += '<textarea id="' + safeId + '-activity-summary" placeholder="What happened? Key takeaways and action items..."></textarea>';
      html += '<div class="activity-form-ftr">';
      html += '<div class="activity-form-error" id="' + safeId + '-activity-error"></div>';
      html += '<button class="activity-form-btn" id="' + safeId + '-activity-submit" onclick="submitActivity(\'' + safeId + '\')">Log Entry</button>';
      html += '</div>';
      html += '</div>';

      // AI debrief extraction area
      html += '<div class="debrief-area" id="' + safeId + '-debrief-area">';
      html += '<div style="font-size:14px;font-weight:500;margin-bottom:6px">AI Debrief Extraction</div>';
      html += '<textarea class="debrief-textarea" id="' + safeId + '-debrief-text" placeholder="Paste your meeting notes, call summary, or debrief here... Describe what happened, who was there, what was discussed, and any next steps." maxlength="10000" oninput="updateDebriefBtn(\'' + safeId + '\')"></textarea>';
      html += '<div class="debrief-char-hint">Recommended: 100 to 5,000 characters</div>';
      html += '<div class="debrief-actions">';
      html += '<button class="debrief-extract-btn" id="' + safeId + '-debrief-btn" disabled onclick="extractDebrief(\'' + safeId + '\')">Extract with AI</button>';
      html += '</div>';
      html += '<div class="debrief-status" id="' + safeId + '-debrief-status"></div>';
      html += '<div id="' + safeId + '-review-panel"></div>';
      html += '</div>';

      // Combined timeline
      html += '<div id="' + safeId + '-activity-timeline">';
      html += renderCombinedTimeline(accountId, combined);
      html += '</div>';

      panel.innerHTML = html;
    })
    .catch(function() {
      if (panel) panel.innerHTML = '<p style="color:var(--red);font-size:13px">Something went wrong. Reload the page and try again.</p>';
    });
}

function renderCombinedTimeline(accountId, combined) {
  if (!combined || combined.length === 0) {
    return '<div class="activity-empty"><h3>No activity yet</h3><p>No activity logged yet. Use the form above to log your first pursuit activity.</p></div>';
  }
  var html = '<div class="activity-timeline">';
  for (var i = 0; i < combined.length; i++) {
    var item = combined[i];
    if (item._isTrigger) {
      html += renderTriggerTimelineEntry(item);
    } else {
      html += renderActivityEntry(item);
    }
  }
  html += '</div>';
  return html;
}

function renderTriggerTimelineEntry(t) {
  var color = TRIGGER_COLORS[t.category] || '#7C8DB5';
  var html = '<div class="activity-entry activity-trigger">';
  html += '<div class="activity-entry-hdr">';
  html += '<span class="activity-trigger-badge" style="background:rgba(' + hexToRgb(color) + ',0.15);color:' + color + '">' + escapeHtml(t.category) + '</span>';
  html += '<span class="activity-meta">' + escapeHtml(formatActivityDate(t.created_at)) + '</span>';
  html += '</div>';
  html += '<div class="activity-summary">' + escapeHtml(t.tag) + '</div>';

  }
  html += '</div>';
  return html;
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return r + ',' + g + ',' + b;
}
